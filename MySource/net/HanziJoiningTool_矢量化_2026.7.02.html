    <style>
        /* 基础样式（不变） */

        .toolbar input[type="text"] { padding: 5px; width: 80px; border: 1px solid #d1d1d6; border-radius: 3px; box-sizing: border-box; }

        .toolbar label { display: inline-flex; align-items: center; font-size: 13px; cursor: pointer; }

        .main { display: flex; gap: 20px; align-items: flex-start; }

        .canvas {
            position: relative;

            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border: 2px solid #333;
            overflow: hidden;

        .canvas.cropping { cursor: crosshair; }
        .center-cross { position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .center-cross::before, .center-cross::after { content: ''; position: absolute; background: rgba(255,0,0,0.3); pointer-events: none; }
        .center-cross::before { left: 50%; top: 0; bottom: 0; width: 1px; }
        .center-cross::after { top: 50%; left: 0; right: 0; height: 1px; }
        .canvas.cropping .part { cursor: crosshair !important; }
        .part { position: absolute; cursor: move; user-select: none; box-sizing: border-box; }
        .part.selected { outline: 2px dashed #2196F3; outline-offset: -1px; }
        .part-inner {
            display: block;

            left: 0;
            line-height: 1;
            white-space: nowrap;
            transform-origin: 0 0;
            color: inherit;

        .canvas.cropping .handle { display: none; }
        .handle.nw { left:-5px; top:-5px; cursor:nwse-resize; }
        .handle.n { left:50%; top:-5px; margin-left:-5px; cursor:ns-resize; }
        .handle.ne { right:-5px; top:-5px; cursor:nesw-resize; }
        .handle.e { right:-5px; top:50%; margin-top:-5px; cursor:ew-resize; }
        .handle.se { right:-5px; bottom:-5px; cursor:nwse-resize; }
        .handle.s { left:50%; bottom:-5px; margin-left:-5px; cursor:ns-resize; }
        .handle.sw { left:-5px; bottom:-5px; cursor:nesw-resize; }
        .handle.w { left:-5px; top:50%; margin-top:-5px; cursor:ew-resize; }
        /* 拖拽期间 .part 继承 canvas 光标，手柄保留自身光标 */
        .canvas.dragging .part { cursor: inherit !important; }

        .freehand-line { position: absolute; left:0; top:0; width:100%; height:100%; pointer-events: none; z-index: 9998; }

        /* 裁剪类型下拉（复用文件下载样式） */

            <div class="editor-label">部件列表（点击选中，×删除）</div>
            <div class="parts-list" id="partsList"></div>
        </div>
    </div>
    <div class="right-panel">
        <div class="props" id="propsPanel"><div style="color:#888;">请先添加并选中一个部件</div></div>
        <div class="editor-label">预览（正常文本大小，字体效果与编辑区一致）</div>
        <div class="preview" id="preview">
            <span style="color: hsl(0, 0%, 40%);">这是预览文字</span><span id="previewChar"></span><span style="color: hsl(0, 0%, 40%);">测试效果。</span>
        </div>
        <div class="preview-adjust">
            基线微调：<input type="number" id="baselineInput" value="-0.14" step="0.01" oninput="updatePreview()"> em
            <span class="tip">（调整此值让拼接字和周围文字基线对齐）</span>
        </div>
        <div style="margin-top:15px;">
            <div class="editor-label">生成的 HTML 代码</div>
            <div class="code-options">
                <label><input type="checkbox" id="includeFont" checked> 包含字体</label>
                <label><input type="checkbox" id="formatCode"> 换行</label>
                <label><input type="checkbox" id="useSvgPaths"> SVG路径</label>
            </div>
            <textarea class="code" id="codeOutput" readonly placeholder="点击生成代码按钮"></textarea>
            <div class="copy-area">
                <button onclick="generateCode()">生成代码</button>
                <button onclick="copyCode()">复制代码</button>
                <div class="download-dropdown" id="downloadDropdown">
                    <button class="dd-btn" onclick="toggleDownloadMenu(event)">文件下载<span class="dd-arrow">▲</span></button>
                    <div class="dd-menu">
                        <button class="dd-item" onclick="downloadHTML()">HTML格式</button>
                        <button class="dd-item" onclick="downloadSVG()">SVG格式</button>
                        <button class="dd-item" onclick="downloadPNG()">PNG格式</button>
                    </div>
                </div>
                <span class="copy-tip" id="copyTip">已复制</span>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // 1. 基础状态
    // ============================================================
    const canvas = document.getElementById('canvas');
    const partsList = document.getElementById('partsList');
    const propsPanel = document.getElementById('propsPanel');
    const previewChar = document.getElementById('previewChar');
    const preview = document.getElementById('preview');
    const codeOutput = document.getElementById('codeOutput');
    const copyTip = document.getElementById('copyTip');

    // 默认字体列表
    const DEFAULT_FONT_STACKS = {
        'SimSun': "'SimSun','宋体',serif",
        'SimHei': "'SimHei','黑体',sans-serif",
        'KaiTi': "'KaiTi','楷体','STKaiti',serif",
        'Microsoft YaHei': "'Microsoft YaHei','微软雅黑',sans-serif",
        'FangSong': "'FangSong','仿宋',serif",
        'LiSu': "'LiSu','隶书',serif",
        'YouYuan': "'YouYuan','幼圆',sans-serif",
        'STXingkai': "'STXingkai','华文行楷',serif",
        'STHupo': "'STHupo','华文琥珀',serif",
        'STXihei': "'STXihei','华文细黑',sans-serif"
    };
    let customFontMap = {};
    let fontNames = Object.keys(DEFAULT_FONT_STACKS);
    let lockedFontFamily = null;

    function getFontStack(name) {
        if (DEFAULT_FONT_STACKS[name]) return DEFAULT_FONT_STACKS[name];
        if (customFontMap[name]) return customFontMap[name];
        return `'${name}',sans-serif`;
    }

    let parts = [];
    let selectedId = null;
    let nextId = 1;
    let pxPerEm = 400;
    let lockAspectRatio = false;
    let allowOverflow = false;
    const OVERFLOW_RANGE = 100;
    let partElements = new Map();
    let clipboardPart = null;

    let isCropping = false;
    let cropType = 'rect'; // 'rect' | 'freehand'
    let cropState = null;
    let freehandPoints = []; // 自由绘制模式的点序列（canvas 相对坐标）
    let vertexEditId = null; // 正在编辑顶点的矢量部件ID，null=不在顶点编辑模式
    let freehandLine = null; // 自由绘制时显示的临时线条元素
    const EPS = 0.0001;
    const CLIP_EPS = 0.00001;

    // ============================================================
    // 2. 命令模式撤销系统（完整）
    // ============================================================
    let commandStack = [];
    let redoStack = [];
    let isUndoing = false;
    const MAX_UNDO = 100;

    class Command {
        constructor() { this.type = 'base'; }
        undo() {}
        redo() {}
    }

    class AddPartCommand extends Command {
        constructor(part) {
            super();
            this.type = 'add';
            this.part = part;
            this.id = part.id;
        }
        undo() {
            const idx = parts.findIndex(p => p.id === this.id);
            if (idx !== -1) {
                parts.splice(idx, 1);
                partElements.delete(this.id);
                removeClipDef(this.id);
                if (selectedId === this.id) selectedId = null;
                renderAll();
            }
        }
        redo() {
            if (!parts.find(p => p.id === this.id)) {
                parts.push(this.part);
                if (this.id >= nextId) nextId = this.id + 1;
                renderAll();
                selectPart(this.id);
            }
        }
    }

    class DeletePartCommand extends Command {
        constructor(id, partData) {
            super();
            this.type = 'delete';
            this.id = id;
            this.partData = partData;
        }
        undo() {
            parts.push(this.partData);
            if (this.id >= nextId) nextId = this.id + 1;
            renderAll();
            selectPart(this.id);
        }
        redo() {
            const idx = parts.findIndex(p => p.id === this.id);
            if (idx !== -1) {
                parts.splice(idx, 1);
                partElements.delete(this.id);
                removeClipDef(this.id);
                if (selectedId === this.id) selectedId = null;
                renderAll();
            }
        }
    }

    class MoveResizeCommand extends Command {
        constructor(id, oldX, oldY, oldW, oldH, newX, newY, newW, newH) {
            super();
            this.type = 'move';
            this.id = id;
            this.oldX = oldX;
            this.oldY = oldY;
            this.oldW = oldW;
            this.oldH = oldH;
            this.newX = newX;
            this.newY = newY;
            this.newW = newW;
            this.newH = newH;
        }
        undo() {
            const p = parts.find(x => x.id === this.id);
            if (p) {
                p.x = this.oldX;
                p.y = this.oldY;
                p.w = this.oldW;
                p.h = this.oldH;
                updatePartElement(p);
                updatePreview();
                updateProps();
            }
        }
        redo() {
            const p = parts.find(x => x.id === this.id);
            if (p) {
                p.x = this.newX;
                p.y = this.newY;
                p.w = this.newW;
                p.h = this.newH;
                updatePartElement(p);
                updatePreview();
                updateProps();
            }
        }
    }

    class CropCommand extends Command {
        constructor(id, oldCrops, oldClipPath, oldClipPathD, newCrops, newClipPath, newClipPathD) {
            super();
            this.type = 'crop';
            this.id = id;
            this.oldCrops = JSON.parse(JSON.stringify(oldCrops || []));
            this.oldClipPath = oldClipPath || '';
            this.oldClipPathD = oldClipPathD || '';
            this.newCrops = JSON.parse(JSON.stringify(newCrops || []));
            this.newClipPath = newClipPath || '';
            this.newClipPathD = newClipPathD || '';
        }
        undo() {
            const p = parts.find(x => x.id === this.id);
            if (p) {
                p.crops = this.oldCrops;
                p.clipPath = this.oldClipPath;
                p.clipPathD = this.oldClipPathD;
                if (p.crops && p.crops.length > 0) {
                    rebuildClipPath(p);
                } else {
                    p.clipPath = '';
                    p.clipPathD = '';
                    removeClipDef(p.id);
                }
                renderAll();
            }
        }
        redo() {
            const p = parts.find(x => x.id === this.id);
            if (p) {
                p.crops = this.newCrops;
                p.clipPath = this.newClipPath;
                p.clipPathD = this.newClipPathD;
                if (p.crops && p.crops.length > 0) {
                    rebuildClipPath(p);
                } else {
                    p.clipPath = '';
                    p.clipPathD = '';
                    removeClipDef(p.id);
                }
                renderAll();
            }
        }
    }

    class UpdatePropCommand extends Command {
        constructor(id, key, oldValue, newValue) {
            super();
            this.type = 'prop';
            this.id = id;
            this.key = key;
            this.oldValue = oldValue;
            this.newValue = newValue;
        }
        undo() {
            const p = parts.find(x => x.id === this.id);
            if (p) {
                p[this.key] = this.oldValue;
                if (this.key === 'z') {
                    parts.sort((a, b) => a.z - b.z);
                }
                renderAll();
                updatePreview();
            }
        }
        redo() {
            const p = parts.find(x => x.id === this.id);
            if (p) {
                p[this.key] = this.newValue;
                if (this.key === 'z') {
                    parts.sort((a, b) => a.z - b.z);
                }
                renderAll();
                updatePreview();
            }
        }
    }

    class BatchDeleteCommand extends Command {
        constructor(partsData) {
            super();
            this.type = 'batchdelete';
            this.partsData = partsData;
        }
        undo() {
            for (const item of this.partsData) {
                const p = item.partData;
                if (!parts.find(x => x.id === p.id)) {
                    parts.push(JSON.parse(JSON.stringify(p)));
                    if (p.id >= nextId) nextId = p.id + 1;
                }
            }
            renderAll();
            if (this.partsData.length > 0) {
                selectPart(this.partsData[this.partsData.length - 1].id);
            }
        }
        redo() {
            for (const item of this.partsData) {
                const idx = parts.findIndex(x => x.id === item.id);
                if (idx !== -1) {
                    parts.splice(idx, 1);
                    partElements.delete(item.id);
                    removeClipDef(item.id);
                }
            }
            selectedId = null;
            renderAll();
        }
    }

    class VectorizeCommand extends Command {
        constructor(originalId, originalData, newParts) {
            super();
            this.type = 'vectorize';
            this.originalId = originalId;
            this.originalData = JSON.parse(JSON.stringify(originalData));
            this.newPartsData = newParts.map(p => JSON.parse(JSON.stringify(p)));
        }
        undo() {
            // 删除新创建的矢量部件
            this.newPartsData.forEach(vp => {
                const idx = parts.findIndex(x => x.id === vp.id);
                if (idx !== -1) { parts.splice(idx, 1);
                    partElements.delete(vp.id);
                    removeClipDef(vp.id); }
            });
            // 恢复原部件
            const restored = { ...JSON.parse(JSON.stringify(this.originalData)), id: this.originalId };
            parts.push(restored);
            parts.sort((a, b) => a.z - b.z);
            selectedId = this.originalId;
            renderAll();
            updatePreview();
            if (selectedId) updateProps();
        }
        redo() {
            // 删除原部件
            const idx = parts.findIndex(x => x.id === this.originalId);
            if (idx !== -1) { parts.splice(idx, 1);
                partElements.delete(this.originalId);
                removeClipDef(this.originalId); }
            // 恢复矢量部件
            this.newPartsData.forEach(vp => {
                if (!parts.find(x => x.id === vp.id)) {
                    parts.push(JSON.parse(JSON.stringify(vp)));
                }
            });
            parts.sort((a, b) => a.z - b.z);
            selectedId = this.newPartsData.length > 0 ? this.newPartsData[0].id : null;
            renderAll();
            updatePreview();
            if (selectedId) updateProps();
        }
    }

    class ResetPartCommand extends Command {
        constructor(id, oldData, snapshot) {
            super();
            this.type = 'reset';
            this.id = id;
            this.oldData = JSON.parse(JSON.stringify(oldData));
            this.snapshot = JSON.parse(JSON.stringify(snapshot));
        }
        undo() {
            const p = parts.find(x => x.id === this.id);
            if (!p) return;
            Object.assign(p, this.oldData);
            p.initialSnapshot = this.oldData.initialSnapshot;
            handleCropsAfterReset(p);
            renderAll();
            selectPart(this.id);
        }
        redo() {
            const p = parts.find(x => x.id === this.id);
            if (!p) return;
            Object.assign(p, this.snapshot);
            p.initialSnapshot = this.snapshot.initialSnapshot;
            handleCropsAfterReset(p);
            renderAll();
            selectPart(this.id);
        }
    }
    function handleCropsAfterReset(p) {
        if (p.crops && p.crops.length > 0) {
            rebuildClipPath(p);
        } else {
            p.clipPath = '';
            p.clipPathD = '';
            removeClipDef(p.id);
        }
    }

    function executeCommand(cmd) {
        if (isUndoing) return;
        commandStack.push(cmd);
        if (commandStack.length > MAX_UNDO) commandStack.shift();
        redoStack = []; // 新操作后清空重做栈
    }

    function undo() {
        if (commandStack.length === 0) {
            alert('没有可撤销的操作');
            return;
        }
        isUndoing = true;
        const cmd = commandStack.pop();
        redoStack.push(cmd);
        cmd.undo();
        isUndoing = false;
        renderAll();
    }

    function redo() {
        if (redoStack.length === 0) {
            alert('没有可重做的操作');
            return;
        }
        const cmd = redoStack.pop();
        cmd.redo();
        renderAll();
    }

    // ============================================================
    // 3. 工具函数
    // ============================================================
    function fmt(n) { const v = parseFloat(n.toFixed(6)); return v === 0 ? 0 : v; }

    function clamp01(v) { return Math.max(0, Math.min(1, v)); }

        function escapeHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        function escapeAttr(s) { return s.replace(/"/g, '&quot;'); }

        /** 获取部件的DOM内层 x 方向缩放因子（匹配 inner transform: scale(w/initW * charW, h)） */
        function getInnerXScale(p) {
            return (p.w / (p.initW || 1)) * (p.charW || p.w);
        }

        /** 重新测量部件的 initW 和 p.w（使用当前 fontWeight/fontFamily/text，适用于所有字符类型） */
        function remeasureInitW(p) {
            if (p.type === 'vector') return; // 矢量部件不需要重测
            const allCJK = [...p.text].every(isCJK);
            const mcv = document.createElement('canvas');
            const mctx = mcv.getContext('2d');
            // 使用与 CSS 相同的 font-stack，确保 canvas 和 DOM 使用一致的回退字体
            mctx.font = p.fontWeight + ' ' + pxPerEm + 'px ' + getFontStack(p.fontFamily);
            const mm = mctx.measureText(p.text);
            const lo = allCJK ? 0.5 : 0.15;
            const hi = 1.5;
            const newW = Math.max(lo, Math.min(hi, Math.round(mm.width / pxPerEm * 20) / 20));
            // 仅当测量值与当前值差异显著时才更新，避免微小浮动导致抖动
            if (Math.abs(newW - p.initW) > 0.02) {
                p.initW = newW;
                p.w = newW;
            }
        }


    function rectEq(a, b) {
        return Math.abs(a.x - b.x) < EPS && Math.abs(a.y - b.y) < EPS &&
            Math.abs(a.w - b.w) < EPS && Math.abs(a.h - b.h) < EPS;
    }

    function subtractRect(a, b) {
        const ix1 = Math.max(a.x, b.x);
        const iy1 = Math.max(a.y, b.y);
        const ix2 = Math.min(a.x + a.w, b.x + b.w);
        const iy2 = Math.min(a.y + a.h, b.y + b.h);
        if (ix1 + EPS >= ix2 || iy1 + EPS >= iy2) return [a];
        const result = [];
        if (iy1 - a.y > EPS) result.push({ x: a.x, y: a.y, w: a.w, h: iy1 - a.y });
        if ((a.y + a.h) - iy2 > EPS) result.push({ x: a.x, y: iy2, w: a.w, h: (a.y + a.h) - iy2 });
        if (ix1 - a.x > EPS) result.push({ x: a.x, y: iy1, w: ix1 - a.x, h: iy2 - iy1 });
        if ((a.x + a.w) - ix2 > EPS) result.push({ x: ix2, y: iy1, w: (a.x + a.w) - ix2, h: iy2 - iy1 });
        return result.filter(r => r.w > EPS && r.h > EPS);
    }

    function snapRectEdges(r, existingCrops, pxWidth, pxHeight) {
        const tolX = pxWidth > 0 ? Math.min(0.05, 1.2 / pxWidth) : 0;
        const tolY = pxHeight > 0 ? Math.min(0.05, 1.2 / pxHeight) : 0;
        const xs = [0, 1],
            ys = [0, 1];
        (existingCrops || []).forEach(c => { xs.push(c.x, c.x + c.w);
            ys.push(c.y, c.y + c.h); });

        function snapVal(v, candidates, tol) {
            let best = v,
                bestDist = tol;
            for (const c of candidates) {
                const d = Math.abs(v - c);
                if (d <= bestDist) { best = c;
                    bestDist = d; }
            }
            return best;
        }
        const x1 = snapVal(r.x, xs, tolX);
        const x2 = snapVal(r.x + r.w, xs, tolX);
        const y1 = snapVal(r.y, ys, tolY);
        const y2 = snapVal(r.y + r.h, ys, tolY);
        return { x: x1, y: y1, w: Math.max(0, x2 - x1), h: Math.max(0, y2 - y1) };
    }

    function mergeAdjacentRects(rects) {
        let list = rects.map(r => ({ x: r.x, y: r.y, w: r.w, h: r.h }));
        let merged = true;
        while (merged) {
            merged = false;
            for (let i = 0; i < list.length && !merged; i++) {
                for (let j = i + 1; j < list.length; j++) {
                    const a = list[i],
                        b = list[j];
                    if (Math.abs(a.y - b.y) < CLIP_EPS && Math.abs(a.h - b.h) < CLIP_EPS) {
                        if (Math.abs((a.x + a.w) - b.x) < CLIP_EPS || Math.abs((b.x + b.w) - a.x) < CLIP_EPS) {
                            const nx = Math.min(a.x, b.x);
                            list.splice(j, 1);
                            list.splice(i, 1);
                            list.push({ x: nx, y: a.y, w: a.w + b.w, h: a.h });
                            merged = true;
                            break;
                        }
                    }
                    if (Math.abs(a.x - b.x) < CLIP_EPS && Math.abs(a.w - b.w) < CLIP_EPS) {
                        if (Math.abs((a.y + a.h) - b.y) < CLIP_EPS || Math.abs((b.y + b.h) - a.y) < CLIP_EPS) {
                            const ny = Math.min(a.y, b.y);
                            list.splice(j, 1);
                            list.splice(i, 1);
                            list.push({ x: a.x, y: ny, w: a.w, h: a.h + b.h });
                            merged = true;
                            break;
                        }
                    }
                }
            }
        }
        return list;
    }

    function rebuildClipPath(p) {
        removeClipDef(p.id);
        if (!p.crops || p.crops.length === 0) {
            p.clipPath = '';
            p.clipPathD = '';
            return;
        }
        // 分离矩形和多边形裁剪条目
        const rectHoles = p.crops.filter(r => !r.type || r.type !== 'poly');
        const polyHoles = p.crops.filter(r => r.type === 'poly');
        let holes = rectHoles.filter(r => r.w > CLIP_EPS && r.h > CLIP_EPS);
        if (holes.length === 0 && polyHoles.length === 0) { p.clipPath = ''; p.clipPathD = ''; return; }
        holes.sort((a, b) => a.x - b.x || a.y - b.y);
        const dedup = [];
        for (const h of holes) {
            let dup = false;
            for (const d of dedup) {
                if (Math.abs(d.x - h.x) < CLIP_EPS && Math.abs(d.y - h.y) < CLIP_EPS &&
                    Math.abs(d.w - h.w) < CLIP_EPS && Math.abs(d.h - h.h) < CLIP_EPS) { dup = true; break; }
            }
            if (!dup) dedup.push(h);
        }
        holes = dedup;
        holes = mergeAdjacentRects(holes);

        const entry = partElements.get(p.id);
        const defs = document.getElementById('clipDefs');
        const clipId = 'clip-part-' + p.id;
        let clipEl = document.getElementById(clipId);
        if (!entry) {
            // objectBoundingBox 分支
            const outer = 'M0,0 L1,0 L1,1 L0,1 Z';
            const holePaths = [];
            // 矩形洞
            holes.forEach(h => {
                const x1 = clamp01(h.x), y1 = clamp01(h.y),
                    x2 = clamp01(h.x + h.w), y2 = clamp01(h.y + h.h);
                if (x2 - x1 < CLIP_EPS || y2 - y1 < CLIP_EPS) return;
                holePaths.push(`M${fmt(x1)},${fmt(y1)} L${fmt(x2)},${fmt(y1)} L${fmt(x2)},${fmt(y2)} L${fmt(x1)},${fmt(y2)} Z`);
            });
            // 多边形洞
            polyHoles.forEach(ph => {
                if (!ph.points || ph.points.length < 3) return;
                const d = buildPolyPath(ph.points);
                holePaths.push(d);
            });
            if (holePaths.length === 0) { p.clipPath = ''; p.clipPathD = ''; return; }
            const d = outer + ' ' + holePaths.join(' ');
            p.clipPathD = d;
            p.clipPath = `url(#${clipId})`;
            if (!clipEl) {
                clipEl = document.createElementNS('http://www.w3.org/2000/svg', 'clipPath');
                clipEl.setAttribute('id', clipId);
                clipEl.setAttribute('clipPathUnits', 'objectBoundingBox');
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('clip-rule', 'evenodd');
                clipEl.appendChild(path);
                defs.appendChild(clipEl);
            }
            clipEl.querySelector('path').setAttribute('d', d);
            return;
        }

        // userSpaceOnUse 分支（编辑区）
        const el = entry.el;
        const rect = el.getBoundingClientRect();
        if (!rect.width || !rect.height) return;
        const outer =
            `M${fmt(rect.left)},${fmt(rect.top)} L${fmt(rect.right)},${fmt(rect.top)} L${fmt(rect.right)},${fmt(rect.bottom)} L${fmt(rect.left)},${fmt(rect.bottom)} Z`;
        const holePaths = [];
        // 矩形洞
        holes.forEach(h => {
            const x1 = rect.left + clamp01(h.x) * rect.width;
            const y1 = rect.top + clamp01(h.y) * rect.height;
            const x2 = rect.left + clamp01(h.x + h.w) * rect.width;
            const y2 = rect.top + clamp01(h.y + h.h) * rect.height;
            if (Math.abs(x2 - x1) < CLIP_EPS || Math.abs(y2 - y1) < CLIP_EPS) return;
            holePaths.push(`M${fmt(x1)},${fmt(y1)} L${fmt(x2)},${fmt(y1)} L${fmt(x2)},${fmt(y2)} L${fmt(x1)},${fmt(y2)} Z`);
        });
        // 多边形洞（缩放到屏幕坐标）
        polyHoles.forEach(ph => {
            if (!ph.points || ph.points.length < 3) return;
            const screenPoints = ph.points.map(pt => ({
                x: rect.left + clamp01(pt.x) * rect.width,
                y: rect.top + clamp01(pt.y) * rect.height
            }));
            const d = buildPolyPath(screenPoints);
            holePaths.push(d);
        });
        if (holePaths.length === 0) { p.clipPath = ''; p.clipPathD = ''; return; }
        const d = outer + ' ' + holePaths.join(' ');
        p.clipPathD = d;
        p.clipPath = `url(#${clipId})`;

        if (!clipEl) {
            clipEl = document.createElementNS('http://www.w3.org/2000/svg', 'clipPath');
            clipEl.setAttribute('id', clipId);
            clipEl.setAttribute('clipPathUnits', 'userSpaceOnUse');
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('clip-rule', 'evenodd');
            clipEl.appendChild(path);
            defs.appendChild(clipEl);
        }
        clipEl.querySelector('path').setAttribute('d', d);
    }

    /** 将点数组转为 SVG path d 字符串 */
    function buildPolyPath(points) {
        if (!points || points.length < 3) return '';
        let d = '';
        points.forEach((pt, i) => {
            d += (i === 0 ? 'M' : 'L') + fmt(clamp01(pt.x)) + ',' + fmt(clamp01(pt.y));
        });
        d += ' Z';
        return d;
    }

    function removeClipDef(partId) {
        const el = document.getElementById('clip-part-' + partId);
        if (el) el.remove();
    }

    // ============================================================
    // 4. 应用裁剪
    // ============================================================
    function applyCrop(p, boxRect) {
        const entry = partElements.get(p.id);
        if (!entry) return;
        const el = entry.el;
        const rect = el.getBoundingClientRect();
        if (!rect.width || !rect.height) return;
        let cx = clamp01((boxRect.left - rect.left) / rect.width);
        let cy = clamp01((boxRect.top - rect.top) / rect.height);
        let cw = boxRect.width / rect.width;
        let ch = boxRect.height / rect.height;
        if (cw < EPS || ch < EPS) return;
        let newRect = {
            x: cx,
            y: cy,
            w: Math.min(cw, 1 - cx),
            h: Math.min(ch, 1 - cy)
        };
        if (newRect.w < EPS || newRect.h < EPS) return;
        if (!p.crops) p.crops = [];

        // 仅对矩形条目进行吸附（跳过多边形）
        const rectOnlyCrops = p.crops.filter(r => !r.type || r.type !== 'poly');
        newRect = snapRectEdges(newRect, rectOnlyCrops, rect.width, rect.height);
        if (newRect.w < EPS || newRect.h < EPS) return;

        const oldCrops = JSON.parse(JSON.stringify(p.crops));
        const oldClipPath = p.clipPath || '';
        const oldClipPathD = p.clipPathD || '';

        let remaining = [newRect];
        // 仅对矩形条目进行减法（跳过多边形）
        for (const existing of rectOnlyCrops) {
            const next = [];
            for (const r of remaining) {
                const pieces = subtractRect(r, existing);
                next.push(...pieces);
            }
            remaining = next;
            if (remaining.length === 0) break;
        }
        let added = 0;
        const polyCrops = p.crops.filter(r => r.type === 'poly');
        for (const r of remaining) {
            const rr = {
                x: clamp01(r.x),
                y: clamp01(r.y),
                w: Math.max(EPS, Math.min(r.w, 1 - clamp01(r.x))),
                h: Math.max(EPS, Math.min(r.h, 1 - clamp01(r.y)))
            };
            if (rr.w <= EPS || rr.h <= EPS) continue;

            if (polyCrops.length > 0) {
                // 归并法：将新矩形与所有已有裁剪（含多边形）做并集，消除重叠
                p.crops = unifyCrops(p.crops, { x: rr.x, y: rr.y, w: rr.w, h: rr.h });
                added++;
            } else {
                let dup = false;
                for (const exist of p.crops) {
                    if (!exist.type && rectEq(exist, rr)) { dup = true; break; }
                }
                if (!dup) { p.crops.push(rr); added++; }
            }
        }

        if (added > 0) {
            rebuildClipPath(p);
            const newCrops = JSON.parse(JSON.stringify(p.crops));
            const newClipPath = p.clipPath || '';
            const newClipPathD = p.clipPathD || '';
            const cmd = new CropCommand(p.id, oldCrops, oldClipPath, oldClipPathD, newCrops, newClipPath, newClipPathD);
            executeCommand(cmd);
            renderAll();
        }
    }

    // ============================================================
    // 5. 交互：裁剪模式
    // ============================================================
    function exitCropMode() {
        if (isCropping) {
            isCropping = false;
            if (cropState) {
                if (cropState.box) cropState.box.remove();
                cropState = null;
            }
            clearFreehandLine();
            freehandPoints = [];
            syncCropButton();
            renderAll();
        }
    }

    function toggleCropMode() {
        if (!selectedId) return;
        const p = parts.find(x => x.id === selectedId);
        if (!p) return;
        if (Math.abs(p.angle || 0) > 0.001 || Math.abs(p.skew || 0) > 0.001 || p.flipH || p.flipV) {
            return;
        }
        isCropping = !isCropping;
        if (!isCropping && cropState) {
            if (cropState.box) cropState.box.remove();
            cropState = null;
        }
        syncCropButton();
        renderAll();
    }

    function syncCropButton() {
        const btn = document.getElementById('cropBtn');
        if (!btn) return;
        btn.textContent = isCropping ? '裁剪模式' : '裁剪部件';
        btn.classList.toggle('active', isCropping);
        canvas.classList.toggle('cropping', isCropping);
        const dropdown = document.getElementById('cropTypeDropdown');
        if (dropdown) dropdown.style.display = isCropping ? '' : 'none';
    }

    function toggleCropTypeMenu(e) {
        e.stopPropagation();
        const dropdown = document.getElementById('cropTypeDropdown');
        if (dropdown) dropdown.classList.toggle('open');
    }

    function setCropType(type) {
        cropType = type;
        // 关闭下拉菜单
        const dropdown = document.getElementById('cropTypeDropdown');
        if (dropdown) dropdown.classList.remove('open');
        // 清理当前的裁剪状态
        if (cropState) {
            if (cropState.box) cropState.box.remove();
            cropState = null;
        }
        clearFreehandLine();
        freehandPoints = [];
        renderAll();
    }

    // 点击页面其他地方关闭裁剪类型下拉
    document.addEventListener('click', function(e) {
        const dropdown = document.getElementById('cropTypeDropdown');
        if (dropdown && !dropdown.contains(e.target)) {
            dropdown.classList.remove('open');
        }
    });

    canvas.addEventListener('mousedown', (e) => {
        const partEl = e.target.closest('.part');
        if (!partEl) {
            if (isCropping) {
                isCropping = false;
                if (cropState) {
                    if (cropState.box) cropState.box.remove();
                    cropState = null;
                }
            }
            selectedId = null;
            syncCropButton();
            renderAll();
            e.stopPropagation();
            e.preventDefault();
            return;
        }
        if (!isCropping) return;
        const id = parseInt(partEl.dataset.id);
        if (id !== selectedId) return;
        const p = parts.find(x => x.id === id);
        if (!p) return;
        if (Math.abs(p.angle || 0) > 0.001 || Math.abs(p.skew || 0) > 0.001 || p.flipH || p.flipV) {
            return;
        }
        const entry = partElements.get(p.id);
        if (!entry) return;
        const el = entry.el;
        const rect = el.getBoundingClientRect();
        if (e.clientX < rect.left || e.clientX > rect.right ||
            e.clientY < rect.top || e.clientY > rect.bottom) return;

        const canvasRect = canvas.getBoundingClientRect();
        const startX = e.clientX - canvasRect.left;
        const startY = e.clientY - canvasRect.top;

        if (cropType === 'freehand') {
            // 自由绘制模式：开始记录点序列
            cropState = {
                startX, startY,
                el, p,
                canvasRect
            };
            freehandPoints = [{ x: startX, y: startY }];
            // 创建自由绘制线条 SVG 元素
            clearFreehandLine();
            const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svgEl.className = 'freehand-line';
            svgEl.style.left = '0px';
            svgEl.style.top = '0px';
            svgEl.style.width = canvasRect.width + 'px';
            svgEl.style.height = canvasRect.height + 'px';
            const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            pathEl.setAttribute('d', `M${startX},${startY}`);
            // 显式设置填充和边框，确保样式生效
            pathEl.setAttribute('fill', 'rgba(255,0,0,0.2)');
            pathEl.setAttribute('stroke', '#ff0000');
            pathEl.setAttribute('stroke-width', '2');
            pathEl.setAttribute('stroke-dasharray', '5,3');
            svgEl.appendChild(pathEl);
            canvas.appendChild(svgEl);
            freehandLine = svgEl;
            cropState.box = svgEl; // 复用 box 字段来存储 SVG 引用
        } else {
            // 矩形裁剪模式
            cropState = {
                startX, startY,
                el, p,
                canvasRect
            };
            const box = document.createElement('div');
            box.className = 'crop-box';
            box.style.left = startX + 'px';
            box.style.top = startY + 'px';
            box.style.width = '0px';
            box.style.height = '0px';
            canvas.appendChild(box);
            cropState.box = box;
        }
        e.stopPropagation();
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!cropState) return;
        const canvasRect = cropState.canvasRect;
        let x = e.clientX - canvasRect.left;
        let y = e.clientY - canvasRect.top;
        x = Math.max(0, Math.min(x, canvasRect.width));
        y = Math.max(0, Math.min(y, canvasRect.height));
        const box = cropState.box;
        if (cropType === 'freehand' && freehandLine) {
            // 自由绘制：间距采样（最少3px才加新点）防止点过多导致崩溃
            const lastPt = freehandPoints[freehandPoints.length - 1];
            const dist = lastPt ? Math.hypot(x - lastPt.x, y - lastPt.y) : Infinity;
            const MAX_POINTS = 400;
            if (dist >= 3 && freehandPoints.length < MAX_POINTS) {
                freehandPoints.push({ x, y });
                // 每6个点更新一次路径显示（降低刷新频率）
                if (freehandPoints.length % 6 === 0 || freehandPoints.length === 2) {
                    updateFreehandPath();
                }
            }
            cropState.startX = x;
            cropState.startY = y;
        } else {
            // 矩形裁剪模式
            const sx = cropState.startX;
            const sy = cropState.startY;
            box.style.left = Math.min(sx, x) + 'px';
            box.style.top = Math.min(sy, y) + 'px';
            box.style.width = Math.abs(x - sx) + 'px';
            box.style.height = Math.abs(y - sy) + 'px';
        }
    });

    // 更新自由绘制线条的SVG路径（含临时闭合以显示填充）
    function updateFreehandPath() {
        if (!freehandLine || freehandPoints.length < 2) return;
        const pathEl = freehandLine.querySelector('path');
        if (!pathEl) return;
        let d = '';
        freehandPoints.forEach((pt, i) => {
            d += (i === 0 ? 'M' : 'L') + pt.x + ',' + pt.y;
        });
        d += ' Z'; // 临时闭合以显示填充
        pathEl.setAttribute('d', d);
    }

    document.addEventListener('mouseup', () => {
        if (!cropState) return;
        const p = cropState.p;
        const box = cropState.box;
        if (cropType === 'freehand') {
            // 自由绘制模式：闭合路径并应用裁剪
            if (freehandPoints.length >= 3) {
                // 闭合路径：添加起点作为终点
                const pts = [...freehandPoints, { x: freehandPoints[0].x, y: freehandPoints[0].y }];
                applyFreehandCrop(p, pts);
            }
            clearFreehandLine();
            freehandPoints = [];
        } else if (box) {
            const boxRect = box.getBoundingClientRect();
            if (boxRect.width > 5 && boxRect.height > 5) {
                applyCrop(p, boxRect);
            }
            box.remove();
        }
        cropState = null;
        renderAll();
    });

    // 清除自由绘制临时线条
    function clearFreehandLine() {
        if (freehandLine) {
            freehandLine.remove();
            freehandLine = null;
        }
    }

    // 应用自由绘制裁剪：统一通过 canvas 布尔并集避开已裁剪区域
    function applyFreehandCrop(p, canvasPoints) {
        const entry = partElements.get(p.id);
        if (!entry) return;
        const el = entry.el;
        const rect = el.getBoundingClientRect();
        if (!rect.width || !rect.height) return;
        if (canvasPoints.length < 3) return;

        const normalizedPoints = canvasPoints.map(pt => ({
            x: clamp01((pt.x - (rect.left - cropState.canvasRect.left)) / rect.width),
            y: clamp01((pt.y - (rect.top - cropState.canvasRect.top)) / rect.height)
        }));

        const oldCrops = JSON.parse(JSON.stringify(p.crops || []));
        const oldClipPath = p.clipPath || '';
        const oldClipPathD = p.clipPathD || '';

        // 归并法：将所有已有裁剪 + 新多边形渲染到 canvas 做并集追踪
        p.crops = unifyCrops(p.crops || [], { type: 'poly', points: normalizedPoints });

        rebuildClipPath(p);
        const newCrops = JSON.parse(JSON.stringify(p.crops));
        const newClipPath = p.clipPath || '';
        const newClipPathD = p.clipPathD || '';
        const cmd = new CropCommand(p.id, oldCrops, oldClipPath, oldClipPathD, newCrops, newClipPath, newClipPathD);
        executeCommand(cmd);
        renderAll();
    }

    /** 归并法：将已有裁剪 + 新裁剪渲染到 canvas，追踪并集轮廓，消除重叠 */
    function unifyCrops(existingCrops, newCrop) {
        const S = 5; // 500x500 精度足够
        const cvsW = 100 * S;
        const cvsH = 100 * S;
        const cvs = document.createElement('canvas');
        cvs.width = cvsW;
        cvs.height = cvsH;
        const ctx = cvs.getContext('2d');
        ctx.fillStyle = '#fff';

        const drawCrop = (crop) => {
            if (crop.type === 'poly') {
                if (!crop.points || crop.points.length < 3) return;
                ctx.beginPath();
                crop.points.forEach((pt, i) => {
                    const x = clamp01(pt.x) * cvsW;
                    const y = clamp01(pt.y) * cvsH;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.closePath();
                ctx.fill();
            } else {
                if (crop.w <= EPS || crop.h <= EPS) return;
                const rx = Math.round(clamp01(crop.x) * cvsW);
                const ry = Math.round(clamp01(crop.y) * cvsH);
                const rw = Math.max(1, Math.round(clamp01(crop.x + crop.w) * cvsW) - rx);
                const rh = Math.max(1, Math.round(clamp01(crop.y + crop.h) * cvsH) - ry);
                ctx.fillRect(rx, ry, rw, rh);
            }
        };

        existingCrops.forEach(drawCrop);
        drawCrop(newCrop);

        const imageData = ctx.getImageData(0, 0, cvsW, cvsH);
        const contours = traceContours(imageData.data, cvsW, cvsH, 40);

        const result = [];
        for (const contour of contours) {
            if (contour.length < 3) continue;
            const pts = contour.map(p => ({ x: clamp01(p.x / cvsW), y: clamp01(p.y / cvsH) }));
            // 矩形检测：尽量保持矩形格式
            const b = { minX: 1, minY: 1, maxX: 0, maxY: 0 };
            pts.forEach(p => { b.minX = Math.min(b.minX, p.x); b.minY = Math.min(b.minY, p.y); b.maxX = Math.max(b.maxX, p.x); b.maxY = Math.max(b.maxY, p.y); });
            const bw = b.maxX - b.minX, bh = b.maxY - b.minY;
            if (bw > 0.002 && bh > 0.002 && pts.every(pt =>
                Math.abs(pt.x - b.minX) < 0.028 || Math.abs(pt.x - b.maxX) < 0.028 ||
                Math.abs(pt.y - b.minY) < 0.028 || Math.abs(pt.y - b.maxY) < 0.028
            )) {
                result.push({ x: b.minX, y: b.minY, w: bw, h: bh });
            } else {
                result.push({ type: 'poly', points: pts });
            }
        }
        return result;
    }

    /** 为矢量部件渲染 path + 裁剪后追踪轮廓，返回裁剪后的 path 数据 */
    function traceVectorWithCrops(p) {
        const DPI = 6;
        const cvsW = Math.max(4, Math.ceil(p.vW * pxPerEm * DPI));
        const cvsH = Math.max(4, Math.ceil(p.vH * pxPerEm * DPI));
        const cvs = document.createElement('canvas');
        cvs.width = cvsW;
        cvs.height = cvsH;
        const ctx = cvs.getContext('2d');
        // 路径数据是 em 坐标，1em = pxPerEm CSS像素，乘 DPI 获取画布像素
        ctx.scale(pxPerEm * DPI, pxPerEm * DPI);

        // 渲染 path
        const path2d = new Path2D(p.pathData);
        ctx.fillStyle = '#000';
        ctx.fill(path2d);

        // 应用裁剪：恢复像素坐标
        if (p.crops && p.crops.length > 0) {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = '#fff';
            p.crops.forEach(r => {
                if (r.type === 'poly') {
                    if (!r.points || r.points.length < 3) return;
                    ctx.beginPath();
                    r.points.forEach((pt, i) => {
                        const px = clamp01(pt.x) * cvsW;
                        const py = clamp01(pt.y) * cvsH;
                        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                    });
                    ctx.closePath();
                    ctx.fill();
                } else {
                    if (r.w <= CLIP_EPS || r.h <= CLIP_EPS) return;
                    const rx = Math.round(clamp01(r.x) * cvsW);
                    const ry = Math.round(clamp01(r.y) * cvsH);
                    const rw = Math.max(1, Math.round(clamp01(r.x + r.w) * cvsW) - rx);
                    const rh = Math.max(1, Math.round(clamp01(r.y + r.h) * cvsH) - ry);
                    ctx.fillRect(rx, ry, rw, rh);
                }
            });
            ctx.globalCompositeOperation = 'source-over';
        }

        const imageData = ctx.getImageData(0, 0, cvsW, cvsH);
        const contours = traceContours(imageData.data, cvsW, cvsH, 40);
        const emScale = 1 / (pxPerEm * DPI);
        const result = [];
        for (const contour of contours) {
            if (contour.length < 3) continue;
            let d = '';
            contour.forEach((pt, i) => {
                const x = pt.x * emScale;
                const y = pt.y * emScale;
                d += (i === 0 ? 'M' : 'L') + fmt(x) + ',' + fmt(y);
            });
            d += ' Z';
            result.push(d);
        }
        return result.length > 0 ? result : [p.pathData];
    }

    // ============================================================
    // 6. 其他操作
    // ============================================================
    // CJK汉字检测（Basic + Ext A-J + 兼容区 + 部首 + 全角）
    function isCJK(ch) {
        const cp = ch.codePointAt(0);
        return (cp >= 0x3400 && cp <= 0x4DBF) || (cp >= 0x4E00 && cp <= 0x9FFF) ||
            (cp >= 0xF900 && cp <= 0xFAFF) || (cp >= 0x2E80 && cp <= 0x2EFF) ||
            (cp >= 0x2F00 && cp <= 0x2FDF) || (cp >= 0x3000 && cp <= 0x303F) ||
            (cp >= 0xFF00 && cp <= 0xFFEF) || (cp >= 0x20000 && cp <= 0x2EBEF) ||
            (cp >= 0x2F800 && cp <= 0x2FA1F) || (cp >= 0x30000 && cp <= 0x3134F) ||
            (cp >= 0x31350 && cp <= 0x323AF) || (cp >= 0x2EBF0 && cp <= 0x2EE5F);
    }
    function addPart() {
        const text = document.getElementById('partInput').value.trim();
        if (!text) { alert('请输入文字'); return; }
        const allCJK = [...text].every(isCJK);
        let initW = 1, initH = 1, charW = 1;
        if (!allCJK) {
            // 非汉字：按像素宽计算拉伸框，字符保持默认高度不压缩
            const fontName = lockedFontFamily || 'SimSun';
            const measureCvs = document.createElement('canvas');
            const measureCtx = measureCvs.getContext('2d');
            // 使用与 CSS 相同的 font-stack，确保 canvas 和 DOM 使用一致的回退字体
            measureCtx.font = '400 ' + pxPerEm + 'px ' + getFontStack(fontName);
            const mMetrics = measureCtx.measureText(text);
            initW = Math.max(0.15, Math.min(1.5, Math.round(mMetrics.width / pxPerEm * 20) / 20));
            initH = 1; // 高度始终1em
        }
        const initX = (1 - initW) / 2;
        const initY = 0;
        const part = {
            id: nextId++,
            text: text,
            x: initX,
            y: initY,
            w: initW,
            h: initH,
            z: parts.length + 1,
            fontWeight: 400,
            fontFamily: lockedFontFamily || 'SimSun',
            angle: 0,
            skew: 0,
            flipH: false,
            flipV: false,
            color: '',
            opacity: 1,
            charW: charW,
            initW: initW,
            clipPath: '',
            clipPathD: '',
            crops: [],
            cropHistory: []
        };
        part.initialSnapshot = JSON.parse(JSON.stringify({
            text: text, x: initX, y: initY, w: initW, h: initH,
            z: parts.length + 1, fontWeight: 400, fontFamily: 'SimSun',
            angle: 0, skew: 0, flipH: false, flipV: false,
            color: '', opacity: 1, charW: charW, initW: initW,
            clipPath: '', clipPathD: '', crops: [], cropHistory: []
        }));
        parts.push(part);
        document.getElementById('partInput').value = '';
        const cmd = new AddPartCommand(part);
        executeCommand(cmd);
        renderAll();
        selectPart(part.id);
    }

    function deletePart(id) {
        if (selectedId === id && isCropping) {
            if (cropState) { if (cropState.box) cropState.box.remove();
                cropState = null; }
        }
        const p = parts.find(x => x.id === id);
        if (!p) return;
        const partData = JSON.parse(JSON.stringify(p));
        const cmd = new DeletePartCommand(id, partData);
        const idx = parts.findIndex(x => x.id === id);
        if (idx !== -1) {
            parts.splice(idx, 1);
            partElements.delete(id);
            removeClipDef(id);
            if (selectedId === id) selectedId = null;
            renderAll();
            executeCommand(cmd);
        }
    }

    function resetPart(id) {
        const p = parts.find(x => x.id === id);
        if (!p || !p.initialSnapshot) return;
        const cmd = new ResetPartCommand(id, p, p.initialSnapshot);
        Object.assign(p, JSON.parse(JSON.stringify(p.initialSnapshot)));
        if (lockedFontFamily) p.fontFamily = lockedFontFamily;
        handleCropsAfterReset(p);
        executeCommand(cmd);
        renderAll();
        selectPart(id);
    }

    /** 矢量化：将文字部件拆分为独立矢量部件，空洞归入所属外层图形 */
    function vectorizePart(id) {
        const p = parts.find(x => x.id === id);
        if (!p || p.type === 'vector') return;

        const rawPaths = generatePartSvgPaths(p);
        if (rawPaths.length === 0) {
            alert('矢量化失败：未能生成路径数据');
            return;
        }

        // 过滤极小碎片，保留有效轮廓及其包围盒
        const contours = [];
        rawPaths.forEach(d => {
            const b = getPathBounds(d);
            if (b && b.w > 0.003 && b.h > 0.003) {
                contours.push({ d, b, area: b.w * b.h });
            }
        });
        if (contours.length === 0) {
            alert('矢量化失败：无可用的轮廓');
            return;
        }

        // 按面积降序排列（大的先处理）
        contours.sort((a, b) => b.area - a.area);

        // 判断点是否在轮廓内（用Path2D）
        function pointInContour(c, px, py) {
            try {
                const p2d = new Path2D(c.d);
                return false; // Path2D.isPointInPath 需要context，改用canvas
            } catch(_) { return false; }
        }

        // 使用 canvas Path2D 判断包含关系
        const tstCvs = document.createElement('canvas');
        const tstCtx = tstCvs.getContext('2d');
        function isContourHole(holeC, outerC) {
            // 检查hole的中心点是否在outer内
            const hcx = holeC.b.minX + holeC.b.w / 2;
            const hcy = holeC.b.minY + holeC.b.h / 2;
            try {
                const p2d = new Path2D(outerC.d);
                return tstCtx.isPointInPath(p2d, hcx, hcy);
            } catch(_) { return false; }
        }

        // 分组：每个outer可能有多个hole
        const outerContours = [];
        const assignedHoles = new Set();
        for (let i = 0; i < contours.length; i++) {
            if (assignedHoles.has(i)) continue;
            const holes = [];
            for (let j = i + 1; j < contours.length; j++) {
                if (assignedHoles.has(j)) continue;
                if (isContourHole(contours[j], contours[i])) {
                    holes.push(contours[j]);
                    assignedHoles.add(j);
                }
            }
            outerContours.push({ outer: contours[i], holes });
        }

        const newParts = [];
        outerContours.forEach((group, gi) => {
            // 合并outer + holes的路径
            const pathList = [group.outer.d, ...group.holes.map(h => h.d)];
            const combinedD = pathList.join(' ');

            // 计算整体包围盒（outer的包围盒足够，因为holes必然在outer内）
            const b = group.outer.b;
            const adjustedD = translatePath(combinedD, -b.minX, -b.minY);

            const vectorPart = {
                id: nextId++,
                type: 'vector',
                text: p.text + '_' + (gi + 1),
                pathData: adjustedD,
                x: p.x + b.minX,
                y: p.y + b.minY,
                w: b.w,
                h: b.h,
                z: p.z + gi,
                fontWeight: 400,
                fontFamily: p.fontFamily,
                color: p.color || '#000000',
                opacity: p.opacity,
                initW: b.w,
                charW: b.w,
                vW: b.w,
                vH: b.h,
                angle: 0, skew: 0, flipH: false, flipV: false,
                clipPath: '', clipPathD: '', crops: [], cropHistory: []
            };
            vectorPart.initialSnapshot = JSON.parse(JSON.stringify({
                text: vectorPart.text, x: vectorPart.x, y: vectorPart.y,
                w: vectorPart.w, h: vectorPart.h, z: vectorPart.z,
                fontWeight: 400, fontFamily: vectorPart.fontFamily,
                angle: 0, skew: 0, flipH: false, flipV: false,
                color: vectorPart.color, opacity: vectorPart.opacity,
                type: 'vector', pathData: vectorPart.pathData,
                vW: vectorPart.vW, vH: vectorPart.vH,
                initW: vectorPart.initW, charW: vectorPart.charW
            }));
            parts.push(vectorPart);
            newParts.push(vectorPart);
        });

        // 删除原部件
        const idx = parts.findIndex(x => x.id === id);
        if (idx !== -1) {
            const partData = JSON.parse(JSON.stringify(p));
            const delCmd = new DeletePartCommand(id, partData);
            parts.splice(idx, 1);
            partElements.delete(id);
            removeClipDef(id);
            executeCommand(delCmd);
        }

        if (newParts.length > 0) {
            const cmd = new VectorizeCommand(id, p, newParts);
            executeCommand(cmd);
            selectedId = newParts[0].id;
        } else {
            selectedId = null;
        }
        renderAll();
        updatePreview();
        if (selectedId) updateProps();
    }

    /** 解析 SVG path d 字符串的包围盒 */
    function getPathBounds(d) {
        if (!d) return null;
        const reg = /[ML]\s*(-?[\d.]+)\s*[, ]\s*(-?[\d.]+)/g;
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        let found = false;
        let m;
        while ((m = reg.exec(d)) !== null) {
            found = true;
            const x = parseFloat(m[1]), y = parseFloat(m[2]);
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
        }
        if (!found) return null;
        return { minX, minY, maxX, maxY, w: maxX - minX, h: maxY - minY };
    }

    /** 平移 SVG path d 字符串中的所有坐标 */
    function translatePath(d, dx, dy) {
        if (!d) return '';
        const reg = /([ML]\s*)(-?[\d.]+)(\s*[, ]\s*)(-?[\d.]+)/g;
        return d.replace(reg, (_, prefix, x, sep, y) => {
            return prefix + (parseFloat(x) + dx).toFixed(6) + sep + (parseFloat(y) + dy).toFixed(6);
        });
    }

    /** 解析 SVG path 的顶点坐标，返回 [{x,y,cmd},...] */
    function parsePathVertices(d) {
        const verts = [];
        const reg = /([ML])\s*(-?[\d.]+)\s*[, ]\s*(-?[\d.]+)/g;
        let m;
        while ((m = reg.exec(d)) !== null) {
            verts.push({ cmd: m[1], x: parseFloat(m[2]), y: parseFloat(m[3]) });
        }
        return verts;
    }

    /** 从顶点数组生成直线段路径（存储用，不含细分） */
    function verticesToPathSimple(verts) {
        if (verts.length === 0) return '';
        let d = '';
        verts.forEach((v, i) => { d += (i === 0 ? 'M' : 'L') + fmt(v.x) + ',' + fmt(v.y); });
        return d + ' Z';
    }

    /** 从顶点数组生成细分平滑路径（显示用） */
    function verticesToPathDisplay(verts) {
        if (verts.length === 0) return '';
        const SUB = 6;
        let d = '';
        const n = verts.length;
        for (let i = 0; i < n; i++) {
            const a = verts[i];
            const b = verts[(i + 1) % n];
            if (i === 0) d += 'M' + fmt(a.x) + ',' + fmt(a.y);
            for (let j = 1; j <= SUB; j++) {
                const t = j / SUB;
                d += 'L' + fmt(a.x + (b.x - a.x) * t) + ',' + fmt(a.y + (b.y - a.y) * t);
            }
        }
        return d + ' Z';
    }

    /** 在部件元素上渲染可拖动的顶点圆点（仅显示简化后的顶点） */
    function renderVertexDots(p, el) {
        const rawVerts = parsePathVertices(p.pathData);
        if (rawVerts.length < 3) return;
        // 简化顶点：从几百个减到可控数量（约10-30个）
        const simplified = simplifyPath(rawVerts, 0.005);
        const verts = simplified.length >= 3 ? simplified : rawVerts;

        const vg = document.createElement('div');
        vg.className = 'vertex-group';
        vg.style.cssText = 'position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:100;';

        const vW = p.vW || p.w, vH = p.vH || p.h;
        verts.forEach((v, i) => {
            const dot = document.createElement('div');
            dot.className = 'vertex-dot';
            const fx = v.x / vW;
            const fy = v.y / vH;
            dot.style.cssText = `position:absolute;left:${(fx * 100).toFixed(2)}%;top:${(fy * 100).toFixed(2)}%;width:8px;height:8px;background:#2196F3;border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%);pointer-events:auto;cursor:move;z-index:101;box-shadow:0 0 2px rgba(0,0,0,0.3);`;
            dot.dataset.vi = i;
            dot.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                e.preventDefault();
                startVertexDrag(p, el, i, verts);
            });
            vg.appendChild(dot);
        });
        el.appendChild(vg);
    }

    let vertexDragState = null;

    function startVertexDrag(p, el, vi, verts) {
        if (vi < 0 || vi >= verts.length) return;
        vertexDragState = { p, el, vi, verts };
        document.addEventListener('mousemove', onVertexDragMove);
        document.addEventListener('mouseup', onVertexDragEnd);
    }

    function onVertexDragMove(e) {
        if (!vertexDragState) return;
        const { p, el, vi, verts } = vertexDragState;
        const rect = el.getBoundingClientRect();
        if (!rect.width || !rect.height) return;
        // 转为部件内部 0-1 坐标
        const fx = clamp01((e.clientX - rect.left) / rect.width);
        const fy = clamp01((e.clientY - rect.top) / rect.height);
        const vW = p.vW || p.w, vH = p.vH || p.h;
        verts[vi].x = fx * vW;
        verts[vi].y = fy * vH;
        // 更新路径：存储版（直线）、显示版（细分平滑）
        p.pathData = verticesToPathSimple(verts);
        const displayD = verticesToPathDisplay(verts);
        // 更新 DOM 用显示版
        const entry = partElements.get(p.id);
        if (entry && entry.inner) {
            const pathEl = entry.inner.querySelector('path');
            if (pathEl) pathEl.setAttribute('d', displayD);
        }
        // 更新顶点圆点位置
        const dot = el.querySelector(`.vertex-dot[data-vi="${vi}"]`);
        if (dot) {
            dot.style.left = (fx * 100).toFixed(2) + '%';
            dot.style.top = (fy * 100).toFixed(2) + '%';
        }
    }

    function onVertexDragEnd() {
        vertexDragState = null;
        document.removeEventListener('mousemove', onVertexDragMove);
        document.removeEventListener('mouseup', onVertexDragEnd);
    }

    let dragState = null;
    let dragStartState = null;

    function onPartMouseDown(e) {
        const id = parseInt(e.currentTarget.dataset.id);
        if (isCropping) {
            if (id !== selectedId) {
                isCropping = false;
                if (cropState) { if (cropState.box) cropState.box.remove();
                    cropState = null; }
                syncCropButton();
            } else {
                return;
            }
        }
        if (e.target.classList.contains('handle')) return;
        const p = parts.find(x => x.id === id);
        if (!p) return;
        selectPart(id);
        dragState = { type: 'move', id: id, startX: e.clientX, startY: e.clientY };
        dragStartState = { x: p.x, y: p.y, w: p.w, h: p.h };
        canvas.classList.add('dragging');
        canvas.style.cursor = 'move';
        e.preventDefault();
    }

    function onHandleMouseDown(e) {
        if (isCropping) return;
        const id = parseInt(e.target.dataset.id);
        const handle = e.target.dataset.handle;
        const p = parts.find(x => x.id === id);
        if (!p) return;
        selectPart(id);
        dragState = { type: 'resize', id: id, handle: handle, startX: e.clientX, startY: e.clientY };
        dragStartState = { x: p.x, y: p.y, w: p.w, h: p.h };
        canvas.classList.add('dragging');
        canvas.style.cursor = getHandleCursor(p, handle);
        e.stopPropagation();
        e.preventDefault();
    }

    document.addEventListener('mousemove', (e) => {
        if (cropState) return;
        if (!dragState) return;
        const p = parts.find(x => x.id === dragState.id);
        if (!p) return;
        let dx = (e.clientX - dragState.startX) / pxPerEm;
        let dy = (e.clientY - dragState.startY) / pxPerEm;

        // 反向旋转屏幕位移到部件本地坐标系
        if (dragState.type === 'resize') {
            const angle = p.angle || 0;
            if (Math.abs(angle) > 0.001) {
                const rad = angle * Math.PI / 180;
                const cosA = Math.cos(-rad), sinA = Math.sin(-rad);
                const rdx = dx * cosA - dy * sinA;
                const rdy = dx * sinA + dy * cosA;
                dx = rdx; dy = rdy;
            }
        }

        if (dragState.type === 'move') {
            p.x = clampX(dragStartState.x + dx, p.w);
            p.y = clampY(dragStartState.y + dy, p.h);
        } else if (dragState.type === 'resize') {
            let nx = dragStartState.x,
                ny = dragStartState.y,
                nw = dragStartState.w,
                nh = dragStartState.h;
            let h = dragState.handle;
            // 翻转时交换手柄语义（e↔w / n↔s），使拉伸方向与视觉一致
            if (p.flipH) h = h.replace(/e/g,'⟪E⟫').replace(/w/g,'e').replace(/⟪E⟫/g,'w');
            if (p.flipV) h = h.replace(/n/g,'⟪N⟫').replace(/s/g,'n').replace(/⟪N⟫/g,'s');
            if (h.includes('e')) nw = dragStartState.w + dx;
            if (h.includes('w')) { nx = dragStartState.x + dx;
                nw = dragStartState.w - dx; }
            if (h.includes('s')) nh = dragStartState.h + dy;
            if (h.includes('n')) { ny = dragStartState.y + dy;
                nh = dragStartState.h - dy; }
            if (lockAspectRatio) {
                const ratio = dragStartState.h / dragStartState.w;
                if (h.includes('e') || h.includes('w')) { nh = nw * ratio; if (h.includes('n')) ny = dragStartState.y + (
                    dragStartState.h - nh); } else if (h.includes('n') || h.includes('s')) { nw = nh / ratio; if (h
                    .includes('w')) nx = dragStartState.x + (dragStartState.w - nw); } else {
                    if (Math.abs(dx) >= Math.abs(dy)) { nh = nw * ratio; if (h.includes('n')) ny = dragStartState.y + (
                        dragStartState.h - nh); } else { nw = nh / ratio; if (h.includes('w')) nx = dragStartState
                        .x + (dragStartState.w - nw); }
                }
            }
            if (nw < 0.05) { nw = 0.05; if (lockAspectRatio) nh = nw * (dragStartState.h / dragStartState.w); if (h
                .includes('w')) nx = dragStartState.x + dragStartState.w - 0.05; }
            if (nh < 0.05) { nh = 0.05; if (lockAspectRatio) nw = nh / (dragStartState.h / dragStartState.w); if (h
                .includes('n')) ny = dragStartState.y + dragStartState.h - 0.05; }
            const minX = allowOverflow ? -OVERFLOW_RANGE : 0,
                minY = allowOverflow ? -OVERFLOW_RANGE : 0;
            const maxX = allowOverflow ? 1 + OVERFLOW_RANGE : 1,
                maxY = allowOverflow ? 1 + OVERFLOW_RANGE : 1;
            if (nx < minX) { nw += (nx - minX);
                nx = minX; }
            if (ny < minY) { nh += (ny - minY);
                ny = minY; }
            if (nx + nw > maxX) nw = maxX - nx;
            if (ny + nh > maxY) nh = maxY - ny;
            p.x = nx;
            p.y = ny;
            p.w = nw;
            p.h = nh;
        }
        updatePartElement(p);
        updatePreview();
        if (selectedId === p.id) {
            const id = p.id;
            document.getElementById('prop_x_' + id).value = p.x.toFixed(3);
            document.getElementById('prop_y_' + id).value = p.y.toFixed(3);
            document.getElementById('prop_w_' + id).value = p.w.toFixed(3);
            document.getElementById('prop_h_' + id).value = p.h.toFixed(3);
        }
    });

    document.addEventListener('mouseup', () => {
        if (dragState) {
            const p = parts.find(x => x.id === dragState.id);
            if (p) {
                if (Math.abs(p.x - dragStartState.x) > EPS || Math.abs(p.y - dragStartState.y) > EPS ||
                    Math.abs(p.w - dragStartState.w) > EPS || Math.abs(p.h - dragStartState.h) > EPS) {
                    const cmd = new MoveResizeCommand(
                        p.id,
                        dragStartState.x, dragStartState.y, dragStartState.w, dragStartState.h,
                        p.x, p.y, p.w, p.h
                    );
                    executeCommand(cmd);
                }
            }
            dragState = null;
            dragStartState = null;
            canvas.classList.remove('dragging');
            canvas.style.cursor = '';
        }
    });

    // ============================================================
    // 7. 辅助函数
    // ============================================================
    function clampX(x, w) { if (allowOverflow) return x; return Math.max(0, Math.min(1 - w, x)); }

    function clampY(y, h) { if (allowOverflow) return y; return Math.max(0, Math.min(1 - h, y)); }

    function clampW(w, x) {
        const minX = allowOverflow ? -OVERFLOW_RANGE : 0;
        const maxX = allowOverflow ? 1 + OVERFLOW_RANGE : 1;
        return Math.max(0.05, Math.min(maxX - x, w));
    }

    function clampH(h, y) {
        const minY = allowOverflow ? -OVERFLOW_RANGE : 0;
        const maxY = allowOverflow ? 1 + OVERFLOW_RANGE : 1;
        return Math.max(0.05, Math.min(maxY - y, h));
    }

    // 光标：手柄指向中心的方向，经 CSS 变换后映射到屏幕方向
    function getHandleCursor(p, h) {
        const angleRad=(p.angle||0)*Math.PI/180, skewRad=(p.skew||0)*Math.PI/180;
        const cosA=Math.cos(angleRad), sinA=Math.sin(angleRad), tanS=Math.tan(skewRad);
        // 手柄指向中心的本地方向，需按实际宽高比加权（对角手柄 w≠h 时方向非45°）
        const pw=p.w, ph=p.h;
        const dirs={n:[0,ph],s:[0,-ph],e:[-pw,0],w:[pw,0],nw:[pw,ph],se:[-pw,-ph],ne:[-pw,ph],sw:[pw,-ph]};
        let dx=dirs[h][0], dy=dirs[h][1];
        // CSS transform: rotate(A) skewX(S) scale(fX,fY)
        // 矩阵 M = R·Sk·Sc，P' = R·Sk·Sc·P，对方向向量按 scale -> skewX -> rotate 顺序变换
        let cx=(p.flipH?-1:1)*dx, cy=(p.flipV?-1:1)*dy;   // scale (flip)
        let kx=cx+tanS*cy, ky=cy;                           // skewX
        let rx=kx*cosA-ky*sinA, ry=kx*sinA+ky*cosA;         // rotate
        const a=Math.atan2(ry,rx), PI=Math.PI;
        if(a>-PI/8&&a<=PI/8) return 'ew-resize';
        if(a>PI/8&&a<=3*PI/8) return 'nwse-resize';
        if(a>3*PI/8&&a<=5*PI/8) return 'ns-resize';
        if(a>5*PI/8&&a<=7*PI/8) return 'nesw-resize';
        if(a>7*PI/8||a<=-7*PI/8) return 'ew-resize';
        if(a>-7*PI/8&&a<=-5*PI/8) return 'nwse-resize';
        if(a>-5*PI/8&&a<=-3*PI/8) return 'ns-resize';
        return 'nesw-resize';
    }

    // 增量更新裁剪按钮状态和提示文字
    function updateCropHint(p) {
        const btnCrop = document.getElementById('cropBtn');
        if (!btnCrop) return;
        const hasTransform = (Math.abs(p.angle || 0) > 0.001 || Math.abs(p.skew || 0) > 0.001 || p.flipH || p.flipV);
        if (hasTransform) {
            btnCrop.disabled = true;
            btnCrop.style.opacity = '0.5';
            btnCrop.style.cursor = 'not-allowed';
        } else {
            btnCrop.disabled = false;
            btnCrop.style.opacity = '';
            btnCrop.style.cursor = '';
        }
        const hintSpan = btnCrop.nextElementSibling;
        if (hintSpan && hintSpan.tagName === 'SPAN') {
            hintSpan.textContent = hasTransform ? '（此变换下无法裁剪）' : (isCropping ? '点击选中部件并框选裁剪' : '');
        }
    }

    // 仅更新镜像按钮的样式/动作/裁剪提示，避免全量 rebuild 面板导致DOM重建
    function updateFlipButtonStyle(p) {
        const activeStyle = 'background:#2196F3;color:#fff;border-color:#1976D2;';
        const inactiveStyle = 'background:;color:;border-color:;';
        ['flipH', 'flipV'].forEach(key => {
            const btn = document.getElementById('prop_' + key + '_' + p.id);
            if (btn) {
                const isActive = p[key];
                btn.style.cssText = 'width:68px;' + (isActive ? activeStyle : inactiveStyle);
                // 必须同步更新 onclick，否则按钮始终传递旧值
                btn.setAttribute('onclick', `updateProp(${p.id}, '${key}', ${!p[key]})`);
            }
        });
        updateCropHint(p);
    }

    function buildOuterTransform(p) {
        let tf = '';
        if (p.angle || 0) tf += 'rotate(' + (p.angle||0) + 'deg) ';
        if (p.skew || 0) tf += 'skewX(' + (p.skew||0) + 'deg) ';
        if (p.flipH || p.flipV) tf += 'scale(' + (p.flipH ? -1 : 1) + ', ' + (p.flipV ? -1 : 1) + ') ';
        return tf.trim() || 'none';
    }

    function updatePartElement(p) {
        const entry = partElements.get(p.id);
        if (!entry) return;
        const { el, clipWrapper, inner } = entry;
        el.style.left = (p.x * pxPerEm) + 'px';
        el.style.top = (p.y * pxPerEm) + 'px';
        el.style.width = (p.w * pxPerEm) + 'px';
        el.style.height = (p.h * pxPerEm) + 'px';
        el.style.zIndex = p.z;
        el.classList.toggle('selected', p.id === selectedId);
        el.style.transformOrigin = '50% 50%';
        el.style.transform = buildOuterTransform(p);
        if (inner) {
            if (p.type === 'vector' && p.pathData) {
                // 矢量化部件更新：SVG 用 100% 自适应，只需更新 viewBox 和路径颜色
                inner.setAttribute('viewBox', `0 0 ${fmt(p.vW || p.w)} ${fmt(p.vH || p.h)}`);
                const pathEl = inner.querySelector('path');
                if (pathEl) {
                    pathEl.setAttribute('d', p.pathData);
                    pathEl.setAttribute('fill', p.color || '#000000');
                    pathEl.setAttribute('opacity', p.opacity);
                }
            } else {
                inner.textContent = p.text;
                inner.style.transform = 'scale(' + (p.w / (p.initW || 1) * (p.charW || p.w)) + ', ' + p.h + ')';
                inner.style.transformOrigin = '0 0';
                inner.style.fontWeight = p.fontWeight;
                inner.style.fontFamily = getFontStack(p.fontFamily);
                inner.style.color = p.color || '';
                inner.style.opacity = p.opacity;
            }
        }
        if (p.clipPath) {
            clipWrapper.style.clipPath = p.clipPath;
            clipWrapper.style.webkitClipPath = p.clipPath;
        } else {
            clipWrapper.style.clipPath = '';
            clipWrapper.style.webkitClipPath = '';
        }
        // 更新手柄光标（角度/翻转变化时光标方向需要重新计算）
        if(p.id===selectedId) el.querySelectorAll('.handle').forEach(h=>{
            h.style.cursor=getHandleCursor(p,h.dataset.handle);
        });
    }

    function renderAll() {
        canvas.innerHTML = '';
        const crossEl = document.createElement('div');
        crossEl.className = 'center-cross';
        canvas.appendChild(crossEl);
        partElements.clear();
        parts.sort((a, b) => a.z - b.z);
        parts.forEach(p => {
            if (p.crops && p.crops.length > 0) {
                rebuildClipPath(p);
            } else {
                p.clipPath = '';
                p.clipPathD = '';
                removeClipDef(p.id);
            }
            const el = document.createElement('div');
            el.className = 'part' + (p.id === selectedId ? ' selected' : '');
            el.style.left = (p.x * pxPerEm) + 'px';
            el.style.top = (p.y * pxPerEm) + 'px';
            el.style.width = (p.w * pxPerEm) + 'px';
            el.style.height = (p.h * pxPerEm) + 'px';
            el.style.zIndex = p.z;
            el.dataset.id = p.id;
            el.style.transformOrigin = '50% 50%';
            el.style.transform = buildOuterTransform(p);

            const clipWrapper = document.createElement('div');
            clipWrapper.className = 'part-clip';
            clipWrapper.style.position = 'absolute';
            clipWrapper.style.left = '0px';
            clipWrapper.style.top = '0px';
            clipWrapper.style.width = '100%';
            clipWrapper.style.height = '100%';
            clipWrapper.style.overflow = 'visible';

            if (p.clipPath) {
                clipWrapper.style.clipPath = p.clipPath;
                clipWrapper.style.webkitClipPath = p.clipPath;
            }

            let inner;
            if (p.type === 'vector' && p.pathData) {
                // 矢量化部件：渲染 SVG 路径（position:absolute 使其填充父容器）
                inner = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                inner.style.position = 'absolute';
                inner.style.left = '0px';
                inner.style.top = '0px';
                inner.style.width = '100%';
                inner.style.height = '100%';
                inner.style.overflow = 'visible';
                inner.setAttribute('viewBox', `0 0 ${fmt(p.vW || p.w)} ${fmt(p.vH || p.h)}`);
                inner.setAttribute('preserveAspectRatio', 'none');
                const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                pathEl.setAttribute('d', p.pathData);
                pathEl.setAttribute('fill-rule', 'evenodd');
                pathEl.setAttribute('fill', p.color || '#000000');
                pathEl.setAttribute('opacity', p.opacity);
                inner.appendChild(pathEl);
                clipWrapper.appendChild(inner);
                partElements.set(p.id, { el, clipWrapper, inner });
            } else {
                inner = document.createElement('span');
                inner.className = 'part-inner';
                inner.textContent = p.text;
                inner.style.fontSize = pxPerEm + 'px';
                inner.style.transform = 'scale(' + (p.w / (p.initW || 1) * (p.charW || p.w)) + ', ' + p.h + ')';
                inner.style.transformOrigin = '0 0';
                inner.style.fontWeight = p.fontWeight;
                inner.style.fontFamily = getFontStack(p.fontFamily);
                inner.style.color = p.color || '';
                inner.style.opacity = p.opacity;
                clipWrapper.appendChild(inner);
                partElements.set(p.id, { el, clipWrapper, inner });
            }
            el.addEventListener('mousedown', onPartMouseDown);
            el.appendChild(clipWrapper);

            // z 值标号
            const zBadge = document.createElement('div');
            zBadge.textContent = p.z;
            zBadge.style.cssText = 'position:absolute;top:2px;left:2px;font-size:10px;color:rgba(0,0,0,0.45);pointer-events:none;line-height:1;font-family:sans-serif;';
            el.appendChild(zBadge);

            // 手柄在 .part 内，光标垂直于边线（顶点编辑模式下隐藏手柄）
            if (p.id === selectedId && !isCropping && vertexEditId !== p.id) {
                ['nw','n','ne','e','se','s','sw','w'].forEach(h=>{
                    const handle=document.createElement('div');
                    handle.className='handle '+h;
                    handle.dataset.id=p.id;
                    handle.dataset.handle=h;
                    handle.style.cursor=getHandleCursor(p,h);
                    handle.addEventListener('mousedown',onHandleMouseDown);
                    el.appendChild(handle);
                });
            }
            // 顶点编辑模式：在矢量部件上渲染可拖动的顶点圆点
            if (vertexEditId === p.id && p.type === 'vector' && p.pathData) {
                renderVertexDots(p, el);
            }
            canvas.appendChild(el);
        });
        renderPartsList();
        updatePreview();
        updateProps();
        syncCropButton();
    }

    function renderPartsList() {
        partsList.innerHTML = '';
        if (parts.length === 0) {
            partsList.innerHTML = '<div style="color:#888;padding:5px;">暂无部件</div>';
            return;
        }
        parts.forEach(p => {
            const item = document.createElement('div');
            item.className = 'item' + (p.id === selectedId ? ' selected' : '');
            const vecTag = p.type === 'vector' ? '📐 ' : '';
            item.innerHTML = '<span>z=' + p.z + ' ' + vecTag + '"' + escapeHtml(p.text) + '" (' + p.x.toFixed(2) + ',' + p.y.toFixed(2) +
                ') ' + p.w.toFixed(2) + '×' + p.h.toFixed(2) + (p.crops && p.crops.length > 0 ? ' ✂️' : '') +
                '</span><span class="del" data-id="' + p.id + '">×</span>';
            item.addEventListener('click', (e) => {
                if (e.target.classList.contains('del')) deletePart(p.id);
                else selectPart(p.id);
            });
            partsList.appendChild(item);
        });
    }

    function selectPart(id) { selectedId = id;
        vertexEditId = null; // 切换部件时退出顶点编辑
        renderAll(); }

    function toggleVertexEdit(id) {
        const p = parts.find(x => x.id === id);
        if (!p || p.type !== 'vector') return;
        // 有变换或裁剪时禁止顶点编辑
        const hasTransform = Math.abs(p.angle || 0) > 0.001 || Math.abs(p.skew || 0) > 0.001 || p.flipH || p.flipV;
        const hasCrops = p.crops && p.crops.length > 0;
        if (hasTransform || hasCrops) {
            if (hasTransform) alert('存在旋转/倾斜/镜像变换，无法编辑顶点');
            else alert('存在裁剪区域，无法编辑顶点');
            return;
        }
        vertexEditId = vertexEditId === id ? null : id;
        if (isCropping) { isCropping = false; syncCropButton(); }
        renderAll();
    }

            const wDropdown = document.getElementById('weightDropdown_' + p.id);
            const wList = document.getElementById('weightOptionsList_' + p.id);

                    e.stopPropagation();

            document.addEventListener('click', function(e) {

                    document.querySelectorAll('.font-custom-select .dropdown').forEach(el => el.style.display = 'none');
