<body>
    <svg id="clipDefsSvg" style="position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;overflow:visible;" aria-hidden="true"><defs id="clipDefs"></defs></svg>
    <div class="page-header">
        <h2>汉字拼字工具 <a href="/index">首页</a></h2>
    </div>
    <div class="toolbar" style="margin:16px 24px 0;">
        <label>添加部件：</label>
        <input type="text" id="partInput" placeholder="输入文字" maxlength="2">
        <button onclick="addPart()">添加</button>
        <button onclick="undo()" id="undoBtn">撤销</button>
        <button onclick="clearAll()">清空</button>
        <button onclick="loadSystemFonts()">加载系统字体</button>
        <input type="text" id="zsftUrl" placeholder="ZSFT字体URL" style="width:220px;border:1px solid #d1d1d6;border-radius:1px;padding:3px 6px;">
        <button onclick="loadZsftFont()">加载ZSFT字体</button>
        <span id="zsftStatus" style="font-size:12px;color:#888;"></span>
    </div>
    <div class="main" style="padding:16px 24px 24px;">
        <div>
            <div class="editor-wrap">
                <div class="editor-label">编辑区（红色十字为中心参考线）
                    <label style="margin-left:12px;font-size:12px;font-weight:normal;vertical-align:middle;"><input type="checkbox" id="lockRatio" onchange="lockAspectRatio=this.checked" style="vertical-align:middle;">锁定长宽比</label>
                    <label style="margin-left:8px;font-size:12px;font-weight:normal;vertical-align:middle;"><input type="checkbox" id="allowOverflow" onchange="toggleOverflow(this.checked)" style="vertical-align:middle;">允许超出边框</label>
                </div>
                <div class="canvas" id="canvas"></div>
                <div class="zoom-control">
                    画布缩放：<input type="number" id="zoomInput" value="400" min="100" max="1200" step="50" onchange="updateZoom()"> px/em
                    <span class="tip">（数值越大，编辑越精细）</span>
                </div>
            </div>
            <div style="margin-top:10px;">
                <div class="editor-label">部件列表（点击选中，×删除）</div>
                <div class="parts-list" id="partsList"></div>
            </div>
        </div>
        <div class="right-panel">
            <div class="props" id="propsPanel"><div style="color:#888;">请先添加并选中一个部件</div></div>
            <div class="editor-label">预览（正常文本大小，字体效果与编辑区一致）</div>
            <div class="preview" id="preview">
                <span style="color: hsl(0, 0%, 40%);">这是预览文字</span><span id="previewChar"></span><span style="color: hsl(0, 0%, 40%);">测试效果。</span>
            </div>
            <div class="preview-adjust">
                基线微调：<input type="number" id="baselineInput" value="-0.14" step="0.01" onchange="updatePreview()"> em
                <span class="tip">（调整此值让拼接字和周围文字基线对齐）</span>
            </div>
            <div style="margin-top:15px;">
                <div class="editor-label">生成的 HTML 代码</div>
                <div class="code-options">
                    <label><input type="checkbox" id="includeFont"> 包含字体</label>
                    <label><input type="checkbox" id="formatCode"> 换行</label>
                    <label><input type="checkbox" id="useSvgPaths"> SVG路径</label>
                </div>
                <textarea class="code" id="codeOutput" readonly placeholder="点击生成代码按钮"></textarea>
                <div class="copy-area">
                    <button onclick="generateCode()">生成代码</button>
                    <button onclick="copyCode()">复制代码</button>
                    <span class="copy-tip" id="copyTip">已复制</span>
                </div>
            </div>
        </div>

    <script>
        // ============================================================
        // 1. 基础状态
        // ============================================================
        const canvas = document.getElementById('canvas');
        const partsList = document.getElementById('partsList');
        const propsPanel = document.getElementById('propsPanel');
        const previewChar = document.getElementById('previewChar');
        const preview = document.getElementById('preview');
        const codeOutput = document.getElementById('codeOutput');
        const copyTip = document.getElementById('copyTip');

        // 默认字体列表
        const DEFAULT_FONT_STACKS = {
            'SimSun': "'SimSun','宋体',serif",
            'SimHei': "'SimHei','黑体',sans-serif",
            'KaiTi': "'KaiTi','楷体','STKaiti',serif",
            'Microsoft YaHei': "'Microsoft YaHei','微软雅黑',sans-serif",
            'FangSong': "'FangSong','仿宋',serif",
            'LiSu': "'LiSu','隶书',serif",
            'YouYuan': "'YouYuan','幼圆',sans-serif",
            'STXingkai': "'STXingkai','华文行楷',serif",
            'STHupo': "'STHupo','华文琥珀',serif",
            'STXihei': "'STXihei','华文细黑',sans-serif"
        };
        let customFontMap = {};
        let fontNames = Object.keys(DEFAULT_FONT_STACKS);

        function getFontStack(name) {
            if (DEFAULT_FONT_STACKS[name]) return DEFAULT_FONT_STACKS[name];
            if (customFontMap[name]) return customFontMap[name];
            return `'${name}',sans-serif`;
        }

        let parts = [];
        let selectedId = null;
        let nextId = 1;
        let pxPerEm = 400;
        let lockAspectRatio = false;
        let allowOverflow = false;
        const OVERFLOW_RANGE = 100;
        let partElements = new Map();
        let clipboardPart = null;

        let isCropping = false;
        let cropState = null;
        const EPS = 0.0001;
        const CLIP_EPS = 0.00001;

        // ============================================================
        // 2. 命令模式撤销系统（完整）
        // ============================================================
        let commandStack = [];
        let redoStack = [];
        let isUndoing = false;
        const MAX_UNDO = 100;

        class Command {
            constructor() { this.type = 'base'; }
            undo() {}
            redo() {}
        }

        class AddPartCommand extends Command {
            constructor(part) {
                super();
                this.type = 'add';
                this.part = part;
                this.id = part.id;
            }
            undo() {
                const idx = parts.findIndex(p => p.id === this.id);
                if (idx !== -1) {
                    parts.splice(idx, 1);
                    partElements.delete(this.id);
                    removeClipDef(this.id);
                    if (selectedId === this.id) selectedId = null;
                    renderAll();
                }
            }
            redo() {
                if (!parts.find(p => p.id === this.id)) {
                    parts.push(this.part);
                    if (this.id >= nextId) nextId = this.id + 1;
                    renderAll();
                    selectPart(this.id);
                }
            }
        }

        class DeletePartCommand extends Command {
            constructor(id, partData) {
                super();
                this.type = 'delete';
                this.id = id;
                this.partData = partData;
            }
            undo() {
                parts.push(this.partData);
                if (this.id >= nextId) nextId = this.id + 1;
                renderAll();
                selectPart(this.id);
            }
            redo() {
                const idx = parts.findIndex(p => p.id === this.id);
                if (idx !== -1) {
                    parts.splice(idx, 1);
                    partElements.delete(this.id);
                    removeClipDef(this.id);
                    if (selectedId === this.id) selectedId = null;
                    renderAll();
                }
            }
        }

        class MoveResizeCommand extends Command {
            constructor(id, oldX, oldY, oldW, oldH, newX, newY, newW, newH) {
                super();
                this.type = 'move';
                this.id = id;
                this.oldX = oldX;
                this.oldY = oldY;
                this.oldW = oldW;
                this.oldH = oldH;
                this.newX = newX;
                this.newY = newY;
                this.newW = newW;
                this.newH = newH;
            }
            undo() {
                const p = parts.find(x => x.id === this.id);
                if (p) {
                    p.x = this.oldX;
                    p.y = this.oldY;
                    p.w = this.oldW;
                    p.h = this.oldH;
                    updatePartElement(p);
                    updatePreview();
                    updateProps();
                }
            }
            redo() {
                const p = parts.find(x => x.id === this.id);
                if (p) {
                    p.x = this.newX;
                    p.y = this.newY;
                    p.w = this.newW;
                    p.h = this.newH;
                    updatePartElement(p);
                    updatePreview();
                    updateProps();
                }
            }
        }

        class CropCommand extends Command {
            constructor(id, oldCrops, oldClipPath, oldClipPathD, newCrops, newClipPath, newClipPathD) {
                super();
                this.type = 'crop';
                this.id = id;
                this.oldCrops = JSON.parse(JSON.stringify(oldCrops || []));
                this.oldClipPath = oldClipPath || '';
                this.oldClipPathD = oldClipPathD || '';
                this.newCrops = JSON.parse(JSON.stringify(newCrops || []));
                this.newClipPath = newClipPath || '';
                this.newClipPathD = newClipPathD || '';
            }
            undo() {
                const p = parts.find(x => x.id === this.id);
                if (p) {
                    p.crops = this.oldCrops;
                    p.clipPath = this.oldClipPath;
                    p.clipPathD = this.oldClipPathD;
                    if (p.crops && p.crops.length > 0) {
                        rebuildClipPath(p);
                    } else {
                        p.clipPath = '';
                        p.clipPathD = '';
                        removeClipDef(p.id);
                    }
                    renderAll();
                }
            }
            redo() {
                const p = parts.find(x => x.id === this.id);
                if (p) {
                    p.crops = this.newCrops;
                    p.clipPath = this.newClipPath;
                    p.clipPathD = this.newClipPathD;
                    if (p.crops && p.crops.length > 0) {
                        rebuildClipPath(p);
                    } else {
                        p.clipPath = '';
                        p.clipPathD = '';
                        removeClipDef(p.id);
                    }
                    renderAll();
                }
            }
        }

        class UpdatePropCommand extends Command {
            constructor(id, key, oldValue, newValue) {
                super();
                this.type = 'prop';
                this.id = id;
                this.key = key;
                this.oldValue = oldValue;
                this.newValue = newValue;
            }
            undo() {
                const p = parts.find(x => x.id === this.id);
                if (p) {
                    p[this.key] = this.oldValue;
                    if (this.key === 'z') {
                        parts.sort((a, b) => a.z - b.z);
                    }
                    renderAll();
                    updatePreview();
                }
            }
            redo() {
                const p = parts.find(x => x.id === this.id);
                if (p) {
                    p[this.key] = this.newValue;
                    if (this.key === 'z') {
                        parts.sort((a, b) => a.z - b.z);
                    }
                    renderAll();
                    updatePreview();
                }
            }
        }

        class BatchDeleteCommand extends Command {
            constructor(partsData) {
                super();
                this.type = 'batchdelete';
                this.partsData = partsData;
            }
            undo() {
                for (const item of this.partsData) {
                    const p = item.partData;
                    if (!parts.find(x => x.id === p.id)) {
                        parts.push(JSON.parse(JSON.stringify(p)));
                        if (p.id >= nextId) nextId = p.id + 1;
                    }
                }
                renderAll();
                if (this.partsData.length > 0) {
                    selectPart(this.partsData[this.partsData.length - 1].id);
                }
            }
            redo() {
                for (const item of this.partsData) {
                    const idx = parts.findIndex(x => x.id === item.id);
                    if (idx !== -1) {
                        parts.splice(idx, 1);
                        partElements.delete(item.id);
                        removeClipDef(item.id);
                    }
                }
                selectedId = null;
                renderAll();
            }
        }

        function executeCommand(cmd) {
            if (isUndoing) return;
            commandStack.push(cmd);
            if (commandStack.length > MAX_UNDO) commandStack.shift();
            redoStack = []; // 新操作后清空重做栈
        }

        function undo() {
            if (commandStack.length === 0) {
                alert('没有可撤销的操作');
                return;
            }
            isUndoing = true;
            const cmd = commandStack.pop();
            redoStack.push(cmd);
            cmd.undo();
            isUndoing = false;
            renderAll();
        }

        function redo() {
            if (redoStack.length === 0) {
                alert('没有可重做的操作');
                return;
            }
            const cmd = redoStack.pop();
            cmd.redo();
            renderAll();
        }

        // ============================================================
        // 3. 工具函数
        // ============================================================
        function fmt(n) { const v = parseFloat(n.toFixed(6)); return v === 0 ? 0 : v; }

        function clamp01(v) { return Math.max(0, Math.min(1, v)); }

        function escapeHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        function escapeAttr(s) { return s.replace(/"/g, '&quot;'); }

        function rectEq(a, b) {
            return Math.abs(a.x - b.x) < EPS && Math.abs(a.y - b.y) < EPS &&
                Math.abs(a.w - b.w) < EPS && Math.abs(a.h - b.h) < EPS;
        }

        function subtractRect(a, b) {
            const ix1 = Math.max(a.x, b.x);
            const iy1 = Math.max(a.y, b.y);
            const ix2 = Math.min(a.x + a.w, b.x + b.w);
            const iy2 = Math.min(a.y + a.h, b.y + b.h);
            if (ix1 + EPS >= ix2 || iy1 + EPS >= iy2) return [a];
            const result = [];
            if (iy1 - a.y > EPS) result.push({ x: a.x, y: a.y, w: a.w, h: iy1 - a.y });
            if ((a.y + a.h) - iy2 > EPS) result.push({ x: a.x, y: iy2, w: a.w, h: (a.y + a.h) - iy2 });
            if (ix1 - a.x > EPS) result.push({ x: a.x, y: iy1, w: ix1 - a.x, h: iy2 - iy1 });
            if ((a.x + a.w) - ix2 > EPS) result.push({ x: ix2, y: iy1, w: (a.x + a.w) - ix2, h: iy2 - iy1 });
            return result.filter(r => r.w > EPS && r.h > EPS);
        }

        function snapRectEdges(r, existingCrops, pxWidth, pxHeight) {
            const tolX = pxWidth > 0 ? Math.min(0.05, 1.2 / pxWidth) : 0;
            const tolY = pxHeight > 0 ? Math.min(0.05, 1.2 / pxHeight) : 0;
            const xs = [0, 1],
                ys = [0, 1];
            (existingCrops || []).forEach(c => { xs.push(c.x, c.x + c.w);
                ys.push(c.y, c.y + c.h); });

            function snapVal(v, candidates, tol) {
                let best = v,
                    bestDist = tol;
                for (const c of candidates) {
                    const d = Math.abs(v - c);
                    if (d <= bestDist) { best = c;
                        bestDist = d; }
                }
                return best;
            }
            const x1 = snapVal(r.x, xs, tolX);
            const x2 = snapVal(r.x + r.w, xs, tolX);
            const y1 = snapVal(r.y, ys, tolY);
            const y2 = snapVal(r.y + r.h, ys, tolY);
            return { x: x1, y: y1, w: Math.max(0, x2 - x1), h: Math.max(0, y2 - y1) };
        }

        function mergeAdjacentRects(rects) {
            let list = rects.map(r => ({ x: r.x, y: r.y, w: r.w, h: r.h }));
            let merged = true;
            while (merged) {
                merged = false;
                for (let i = 0; i < list.length && !merged; i++) {
                    for (let j = i + 1; j < list.length; j++) {
                        const a = list[i],
                            b = list[j];
                        if (Math.abs(a.y - b.y) < CLIP_EPS && Math.abs(a.h - b.h) < CLIP_EPS) {
                            if (Math.abs((a.x + a.w) - b.x) < CLIP_EPS || Math.abs((b.x + b.w) - a.x) < CLIP_EPS) {
                                const nx = Math.min(a.x, b.x);
                                list.splice(j, 1);
                                list.splice(i, 1);
                                list.push({ x: nx, y: a.y, w: a.w + b.w, h: a.h });
                                merged = true;
                                break;
                            }
                        }
                        if (Math.abs(a.x - b.x) < CLIP_EPS && Math.abs(a.w - b.w) < CLIP_EPS) {
                            if (Math.abs((a.y + a.h) - b.y) < CLIP_EPS || Math.abs((b.y + b.h) - a.y) < CLIP_EPS) {
                                const ny = Math.min(a.y, b.y);
                                list.splice(j, 1);
                                list.splice(i, 1);
                                list.push({ x: a.x, y: ny, w: a.w, h: a.h + b.h });
                                merged = true;
                                break;
                            }
                        }
                    }
                }
            }
            return list;
        }

        function rebuildClipPath(p) {
            removeClipDef(p.id);
            if (!p.crops || p.crops.length === 0) {
                p.clipPath = '';
                p.clipPathD = '';
                return;
            }
            let holes = p.crops.filter(r => r.w > CLIP_EPS && r.h > CLIP_EPS);
            if (holes.length === 0) { p.clipPath = '';
                p.clipPathD = ''; return; }
            holes.sort((a, b) => a.x - b.x || a.y - b.y);
            const dedup = [];
            for (const h of holes) {
                let dup = false;
                for (const d of dedup) {
                    if (Math.abs(d.x - h.x) < CLIP_EPS && Math.abs(d.y - h.y) < CLIP_EPS &&
                        Math.abs(d.w - h.w) < CLIP_EPS && Math.abs(d.h - h.h) < CLIP_EPS) { dup = true; break; }
                }
                if (!dup) dedup.push(h);
            }
            holes = dedup;
            if (holes.length === 0) { p.clipPath = '';
                p.clipPathD = ''; return; }
            holes = mergeAdjacentRects(holes);

            const entry = partElements.get(p.id);
            const defs = document.getElementById('clipDefs');
            const clipId = 'clip-part-' + p.id;
            let clipEl = document.getElementById(clipId);
            if (!entry) {
                const outer = 'M0,0 L1,0 L1,1 L0,1 Z';
                const holePaths = holes.map(h => {
                    const x1 = clamp01(h.x),
                        y1 = clamp01(h.y),
                        x2 = clamp01(h.x + h.w),
                        y2 = clamp01(h.y + h.h);
                    if (x2 - x1 < CLIP_EPS || y2 - y1 < CLIP_EPS) return null;
                    return `M${fmt(x1)},${fmt(y1)} L${fmt(x2)},${fmt(y1)} L${fmt(x2)},${fmt(y2)} L${fmt(x1)},${fmt(y2)} Z`;
                }).filter(Boolean);
                if (holePaths.length === 0) { p.clipPath = '';
                    p.clipPathD = ''; return; }
                const d = outer + ' ' + holePaths.join(' ');
                p.clipPathD = d;
                p.clipPath = `url(#${clipId})`;
                if (!clipEl) {
                    clipEl = document.createElementNS('http://www.w3.org/2000/svg', 'clipPath');
                    clipEl.setAttribute('id', clipId);
                    clipEl.setAttribute('clipPathUnits', 'objectBoundingBox');
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('clip-rule', 'evenodd');
                    clipEl.appendChild(path);
                    defs.appendChild(clipEl);
                }
                clipEl.querySelector('path').setAttribute('d', d);
                return;
            }

            const el = entry.el;
            const rect = el.getBoundingClientRect();
            if (!rect.width || !rect.height) return;
            const outer =
                `M${fmt(rect.left)},${fmt(rect.top)} L${fmt(rect.right)},${fmt(rect.top)} L${fmt(rect.right)},${fmt(rect.bottom)} L${fmt(rect.left)},${fmt(rect.bottom)} Z`;
            const holePaths = holes.map(h => {
                const x1 = rect.left + clamp01(h.x) * rect.width;
                const y1 = rect.top + clamp01(h.y) * rect.height;
                const x2 = rect.left + clamp01(h.x + h.w) * rect.width;
                const y2 = rect.top + clamp01(h.y + h.h) * rect.height;
                if (Math.abs(x2 - x1) < CLIP_EPS || Math.abs(y2 - y1) < CLIP_EPS) return null;
                return `M${fmt(x1)},${fmt(y1)} L${fmt(x2)},${fmt(y1)} L${fmt(x2)},${fmt(y2)} L${fmt(x1)},${fmt(y2)} Z`;
            }).filter(Boolean);
            if (holePaths.length === 0) { p.clipPath = '';
                p.clipPathD = ''; return; }
            const d = outer + ' ' + holePaths.join(' ');
            p.clipPathD = d;
            p.clipPath = `url(#${clipId})`;

            if (!clipEl) {
                clipEl = document.createElementNS('http://www.w3.org/2000/svg', 'clipPath');
                clipEl.setAttribute('id', clipId);
                clipEl.setAttribute('clipPathUnits', 'userSpaceOnUse');
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('clip-rule', 'evenodd');
                clipEl.appendChild(path);
                defs.appendChild(clipEl);
            }
            clipEl.querySelector('path').setAttribute('d', d);
        }

        function removeClipDef(partId) {
            const el = document.getElementById('clip-part-' + partId);
            if (el) el.remove();
        }

        // ============================================================
        // 4. 应用裁剪
        // ============================================================
        function applyCrop(p, boxRect) {
            const entry = partElements.get(p.id);
            if (!entry) return;
            const el = entry.el;
            const rect = el.getBoundingClientRect();
            if (!rect.width || !rect.height) return;
            let cx = clamp01((boxRect.left - rect.left) / rect.width);
            let cy = clamp01((boxRect.top - rect.top) / rect.height);
            let cw = boxRect.width / rect.width;
            let ch = boxRect.height / rect.height;
            if (cw < EPS || ch < EPS) return;
            let newRect = {
                x: cx,
                y: cy,
                w: Math.min(cw, 1 - cx),
                h: Math.min(ch, 1 - cy)
            };
            if (newRect.w < EPS || newRect.h < EPS) return;
            if (!p.crops) p.crops = [];

            newRect = snapRectEdges(newRect, p.crops, rect.width, rect.height);
            if (newRect.w < EPS || newRect.h < EPS) return;

            const oldCrops = JSON.parse(JSON.stringify(p.crops));
            const oldClipPath = p.clipPath || '';
            const oldClipPathD = p.clipPathD || '';

            let remaining = [newRect];
            for (const existing of p.crops) {
                const next = [];
                for (const r of remaining) {
                    const pieces = subtractRect(r, existing);
                    next.push(...pieces);
                }
                remaining = next;
                if (remaining.length === 0) break;
            }
            let added = 0;
            for (const r of remaining) {
                const rr = {
                    x: clamp01(r.x),
                    y: clamp01(r.y),
                    w: Math.max(EPS, Math.min(r.w, 1 - clamp01(r.x))),
                    h: Math.max(EPS, Math.min(r.h, 1 - clamp01(r.y)))
                };
                if (rr.w > EPS && rr.h > EPS) {
                    let dup = false;
                    for (const exist of p.crops) {
                        if (rectEq(exist, rr)) { dup = true; break; }
                    }
                    if (!dup) {
                        p.crops.push(rr);
                        added++;
                    }
                }
            }

            if (added > 0) {
                rebuildClipPath(p);
                const newCrops = JSON.parse(JSON.stringify(p.crops));
                const newClipPath = p.clipPath || '';
                const newClipPathD = p.clipPathD || '';
                const cmd = new CropCommand(p.id, oldCrops, oldClipPath, oldClipPathD, newCrops, newClipPath, newClipPathD);
                executeCommand(cmd);
                renderAll();
            }
        }

        // ============================================================
        // 5. 交互：裁剪模式
        // ============================================================
        function exitCropMode() {
            if (isCropping) {
                isCropping = false;
                if (cropState) {
                    if (cropState.box) cropState.box.remove();
                    cropState = null;
                }
                syncCropButton();
                renderAll();
            }
        }

        function toggleCropMode() {
            if (!selectedId) return;
            const p = parts.find(x => x.id === selectedId);
            if (!p) return;
            if (Math.abs(p.angle || 0) > 0.001 || Math.abs(p.skew || 0) > 0.001) {
                return;
            }
            isCropping = !isCropping;
            if (!isCropping && cropState) {
                if (cropState.box) cropState.box.remove();
                cropState = null;
            }
            syncCropButton();
            renderAll();
        }

        function syncCropButton() {
            const btn = document.getElementById('cropBtn');
            if (!btn) return;
            btn.textContent = isCropping ? '裁剪模式' : '裁剪部件';
            btn.classList.toggle('active', isCropping);
            canvas.classList.toggle('cropping', isCropping);
        }

        canvas.addEventListener('mousedown', (e) => {
            const partEl = e.target.closest('.part');
            if (!partEl) {
                if (isCropping) {
                    isCropping = false;
                    if (cropState) {
                        if (cropState.box) cropState.box.remove();
                        cropState = null;
                    }
                }
                selectedId = null;
                syncCropButton();
                renderAll();
                e.stopPropagation();
                e.preventDefault();
                return;
            }
            if (!isCropping) return;
            const id = parseInt(partEl.dataset.id);
            if (id !== selectedId) return;
            const p = parts.find(x => x.id === id);
            if (!p) return;
            if (Math.abs(p.angle || 0) > 0.001 || Math.abs(p.skew || 0) > 0.001) {
                return;
            }
            const entry = partElements.get(p.id);
            if (!entry) return;
            const el = entry.el;
            const rect = el.getBoundingClientRect();
            if (e.clientX < rect.left || e.clientX > rect.right ||
                e.clientY < rect.top || e.clientY > rect.bottom) return;

            const canvasRect = canvas.getBoundingClientRect();
            const startX = e.clientX - canvasRect.left;
            const startY = e.clientY - canvasRect.top;

            cropState = {
                startX, startY,
                el, p,
                canvasRect
            };
            const box = document.createElement('div');
            box.className = 'crop-box';
            box.style.left = startX + 'px';
            box.style.top = startY + 'px';
            box.style.width = '0px';
            box.style.height = '0px';
            canvas.appendChild(box);
            cropState.box = box;
            e.stopPropagation();
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!cropState) return;
            const canvasRect = cropState.canvasRect;
            let x = e.clientX - canvasRect.left;
            let y = e.clientY - canvasRect.top;
            x = Math.max(0, Math.min(x, canvasRect.width));
            y = Math.max(0, Math.min(y, canvasRect.height));
            const box = cropState.box;
            const sx = cropState.startX;
            const sy = cropState.startY;
            box.style.left = Math.min(sx, x) + 'px';
            box.style.top = Math.min(sy, y) + 'px';
            box.style.width = Math.abs(x - sx) + 'px';
            box.style.height = Math.abs(y - sy) + 'px';
        });

        document.addEventListener('mouseup', () => {
            if (!cropState) return;
            const p = cropState.p;
            const box = cropState.box;
            if (box) {
                const boxRect = box.getBoundingClientRect();
                if (boxRect.width > 5 && boxRect.height > 5) {
                    applyCrop(p, boxRect);
                }
                box.remove();
            }
            cropState = null;
            renderAll();
        });

        // ============================================================
        // 6. 其他操作
        // ============================================================
        function addPart() {
            const text = document.getElementById('partInput').value.trim();
            if (!text) { alert('请输入文字'); return; }
            const part = {
                id: nextId++,
                text: text,
                x: 0,
                y: 0,
                w: 1,
                h: 1,
                z: parts.length + 1,
                fontWeight: 400,
                fontFamily: 'SimSun',
                angle: 0,
                skew: 0,
                color: '',
                opacity: 1,
                clipPath: '',
                clipPathD: '',
                crops: [],
                cropHistory: []
            };
            parts.push(part);
            document.getElementById('partInput').value = '';
            const cmd = new AddPartCommand(part);
            executeCommand(cmd);
            renderAll();
            selectPart(part.id);
        }

        function deletePart(id) {
            if (selectedId === id && isCropping) {
                if (cropState) { if (cropState.box) cropState.box.remove();
                    cropState = null; }
            }
            const p = parts.find(x => x.id === id);
            if (!p) return;
            const partData = JSON.parse(JSON.stringify(p));
            const cmd = new DeletePartCommand(id, partData);
            const idx = parts.findIndex(x => x.id === id);
            if (idx !== -1) {
                parts.splice(idx, 1);
                partElements.delete(id);
                removeClipDef(id);
                if (selectedId === id) selectedId = null;
                renderAll();
                executeCommand(cmd);
            }
        }

        let dragState = null;
        let dragStartState = null;

        function onPartMouseDown(e) {
            const id = parseInt(e.currentTarget.dataset.id);
            if (isCropping) {
                if (id !== selectedId) {
                    isCropping = false;
                    if (cropState) { if (cropState.box) cropState.box.remove();
                        cropState = null; }
                    syncCropButton();
                } else {
                    return;
                }
            }
            if (e.target.classList.contains('handle')) return;
            const p = parts.find(x => x.id === id);
            if (!p) return;
            selectPart(id);
            dragState = { type: 'move', id: id, startX: e.clientX, startY: e.clientY };
            dragStartState = { x: p.x, y: p.y, w: p.w, h: p.h };
            e.preventDefault();
        }

        function onHandleMouseDown(e) {
            if (isCropping) return;
            const id = parseInt(e.target.dataset.id);
            const handle = e.target.dataset.handle;
            const p = parts.find(x => x.id === id);
            if (!p) return;
            selectPart(id);
            dragState = { type: 'resize', id: id, handle: handle, startX: e.clientX, startY: e.clientY };
            dragStartState = { x: p.x, y: p.y, w: p.w, h: p.h };
            e.stopPropagation();
            e.preventDefault();
        }

        document.addEventListener('mousemove', (e) => {
            if (cropState) return;
            if (!dragState) return;
            const p = parts.find(x => x.id === dragState.id);
            if (!p) return;
            const dx = (e.clientX - dragState.startX) / pxPerEm;
            const dy = (e.clientY - dragState.startY) / pxPerEm;

            if (dragState.type === 'move') {
                p.x = clampX(dragStartState.x + dx, p.w);
                p.y = clampY(dragStartState.y + dy, p.h);
            } else if (dragState.type === 'resize') {
                let nx = dragStartState.x,
                    ny = dragStartState.y,
                    nw = dragStartState.w,
                    nh = dragStartState.h;
                const h = dragState.handle;
                if (h.includes('e')) nw = dragStartState.w + dx;
                if (h.includes('w')) { nx = dragStartState.x + dx;
                    nw = dragStartState.w - dx; }
                if (h.includes('s')) nh = dragStartState.h + dy;
                if (h.includes('n')) { ny = dragStartState.y + dy;
                    nh = dragStartState.h - dy; }
                if (lockAspectRatio) {
                    const ratio = dragStartState.h / dragStartState.w;
                    if (h.includes('e') || h.includes('w')) { nh = nw * ratio; if (h.includes('n')) ny = dragStartState.y + (
                            dragStartState.h - nh); } else if (h.includes('n') || h.includes('s')) { nw = nh / ratio; if (h
                            .includes('w')) nx = dragStartState.x + (dragStartState.w - nw); } else {
                        if (Math.abs(dx) >= Math.abs(dy)) { nh = nw * ratio; if (h.includes('n')) ny = dragStartState.y + (
                                dragStartState.h - nh); } else { nw = nh / ratio; if (h.includes('w')) nx = dragStartState
                                .x + (dragStartState.w - nw); }
                    }
                }
                if (nw < 0.05) { nw = 0.05; if (lockAspectRatio) nh = nw * (dragStartState.h / dragStartState.w); if (h
                        .includes('w')) nx = dragStartState.x + dragStartState.w - 0.05; }
                if (nh < 0.05) { nh = 0.05; if (lockAspectRatio) nw = nh / (dragStartState.h / dragStartState.w); if (h
                        .includes('n')) ny = dragStartState.y + dragStartState.h - 0.05; }
                const minX = allowOverflow ? -OVERFLOW_RANGE : 0,
                    minY = allowOverflow ? -OVERFLOW_RANGE : 0;
                const maxX = allowOverflow ? 1 + OVERFLOW_RANGE : 1,
                    maxY = allowOverflow ? 1 + OVERFLOW_RANGE : 1;
                if (nx < minX) { nw += (nx - minX);
                    nx = minX; }
                if (ny < minY) { nh += (ny - minY);
                    ny = minY; }
                if (nx + nw > maxX) nw = maxX - nx;
                if (ny + nh > maxY) nh = maxY - ny;
                p.x = nx;
                p.y = ny;
                p.w = nw;
                p.h = nh;
            }
            updatePartElement(p);
            updatePreview();
            if (selectedId === p.id) {
                const id = p.id;
                document.getElementById('prop_x_' + id).value = p.x.toFixed(3);
                document.getElementById('prop_y_' + id).value = p.y.toFixed(3);
                document.getElementById('prop_w_' + id).value = p.w.toFixed(3);
                document.getElementById('prop_h_' + id).value = p.h.toFixed(3);
            }
        });

        document.addEventListener('mouseup', () => {
            if (dragState) {
                const p = parts.find(x => x.id === dragState.id);
                if (p) {
                    if (Math.abs(p.x - dragStartState.x) > EPS || Math.abs(p.y - dragStartState.y) > EPS ||
                        Math.abs(p.w - dragStartState.w) > EPS || Math.abs(p.h - dragStartState.h) > EPS) {
                        const cmd = new MoveResizeCommand(
                            p.id,
                            dragStartState.x, dragStartState.y, dragStartState.w, dragStartState.h,
                            p.x, p.y, p.w, p.h
                        );
                        executeCommand(cmd);
                    }
                }
                dragState = null;
                dragStartState = null;
            }
        });

        // ============================================================
        // 7. 辅助函数
        // ============================================================
        function clampX(x, w) { if (allowOverflow) return x; return Math.max(0, Math.min(1 - w, x)); }

        function clampY(y, h) { if (allowOverflow) return y; return Math.max(0, Math.min(1 - h, y)); }

        function clampW(w, x) {
            const minX = allowOverflow ? -OVERFLOW_RANGE : 0;
            const maxX = allowOverflow ? 1 + OVERFLOW_RANGE : 1;
            return Math.max(0.05, Math.min(maxX - x, w));
        }

        function clampH(h, y) {
            const minY = allowOverflow ? -OVERFLOW_RANGE : 0;
            const maxY = allowOverflow ? 1 + OVERFLOW_RANGE : 1;
            return Math.max(0.05, Math.min(maxY - y, h));
        }

        function updatePartElement(p) {
            const entry = partElements.get(p.id);
            if (!entry) return;
            const { el, clipWrapper, inner } = entry;
            el.style.left = (p.x * pxPerEm) + 'px';
            el.style.top = (p.y * pxPerEm) + 'px';
            el.style.width = (p.w * pxPerEm) + 'px';
            el.style.height = (p.h * pxPerEm) + 'px';
            el.style.zIndex = (p.id === selectedId) ? 10000 : p.z;
            el.classList.toggle('selected', p.id === selectedId);
            el.style.transformOrigin = '50% 50%';
            el.style.transform = 'rotate(' + (p.angle || 0) + 'deg) skewX(' + (p.skew || 0) + 'deg)';
            if (inner) {
                inner.textContent = p.text;
                inner.style.transform = 'scale(' + p.w + ', ' + p.h + ')';
                inner.style.transformOrigin = '0 0';
                inner.style.fontWeight = p.fontWeight;
                inner.style.fontFamily = getFontStack(p.fontFamily);
                inner.style.color = p.color || '';
                inner.style.opacity = p.opacity;
            }
            if (p.clipPath) {
                clipWrapper.style.clipPath = p.clipPath;
                clipWrapper.style.webkitClipPath = p.clipPath;
            } else {
                clipWrapper.style.clipPath = '';
                clipWrapper.style.webkitClipPath = '';
            }
        }

        function renderAll() {
            canvas.innerHTML = '';
            const crossEl = document.createElement('div');
            crossEl.className = 'center-cross';
            canvas.appendChild(crossEl);
            partElements.clear();
            parts.sort((a, b) => a.z - b.z);
            parts.forEach(p => {
                if (p.crops && p.crops.length > 0) {
                    rebuildClipPath(p);
                } else {
                    p.clipPath = '';
                    p.clipPathD = '';
                    removeClipDef(p.id);
                }
                const el = document.createElement('div');
                el.className = 'part' + (p.id === selectedId ? ' selected' : '');
                el.style.left = (p.x * pxPerEm) + 'px';
                el.style.top = (p.y * pxPerEm) + 'px';
                el.style.width = (p.w * pxPerEm) + 'px';
                el.style.height = (p.h * pxPerEm) + 'px';
                el.style.zIndex = (p.id === selectedId) ? 10000 : p.z;
                el.dataset.id = p.id;
                el.style.transformOrigin = '50% 50%';
                el.style.transform = 'rotate(' + (p.angle || 0) + 'deg) skewX(' + (p.skew || 0) + 'deg)';

                const clipWrapper = document.createElement('div');
                clipWrapper.className = 'part-clip';
                clipWrapper.style.position = 'absolute';
                clipWrapper.style.left = '0px';
                clipWrapper.style.top = '0px';
                clipWrapper.style.width = '100%';
                clipWrapper.style.height = '100%';
                clipWrapper.style.overflow = 'visible';

                if (p.clipPath) {
                    clipWrapper.style.clipPath = p.clipPath;
                    clipWrapper.style.webkitClipPath = p.clipPath;
                }

                const inner = document.createElement('span');
                inner.className = 'part-inner';
                inner.textContent = p.text;
                inner.style.fontSize = pxPerEm + 'px';
                inner.style.transform = 'scale(' + p.w + ', ' + p.h + ')';
                inner.style.transformOrigin = '0 0';
                inner.style.fontWeight = p.fontWeight;
                inner.style.fontFamily = getFontStack(p.fontFamily);
                inner.style.color = p.color || '';
                inner.style.opacity = p.opacity;

                clipWrapper.appendChild(inner);
                partElements.set(p.id, { el, clipWrapper, inner });
                if (p.id === selectedId && !isCropping) {
                    ['nw', 'n', 'ne', 'e', 'se', 's', 'sw', 'w'].forEach(h => {
                        const handle = document.createElement('div');
                        handle.className = 'handle ' + h;
                        handle.dataset.id = p.id;
                        handle.dataset.handle = h;
                        handle.addEventListener('mousedown', onHandleMouseDown);
                        el.appendChild(handle);
                    });
                }
                el.addEventListener('mousedown', onPartMouseDown);
                el.appendChild(clipWrapper);
                canvas.appendChild(el);
            });
            renderPartsList();
            updatePreview();
            updateProps();
            syncCropButton();
        }

        function renderPartsList() {
            partsList.innerHTML = '';
            if (parts.length === 0) {
                partsList.innerHTML = '<div style="color:#888;padding:5px;">暂无部件</div>';
                return;
            }
            parts.forEach(p => {
                const item = document.createElement('div');
                item.className = 'item' + (p.id === selectedId ? ' selected' : '');
                item.innerHTML = '<span>z=' + p.z + ' "' + p.text + '" (' + p.x.toFixed(2) + ',' + p.y.toFixed(2) +
                    ') ' + p.w.toFixed(2) + '×' + p.h.toFixed(2) + (p.crops && p.crops.length > 0 ? ' ✂️' : '') +
                    '</span><span class="del" data-id="' + p.id + '">×</span>';
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('del')) deletePart(p.id);
                    else selectPart(p.id);
                });
                partsList.appendChild(item);
            });
        }

        function selectPart(id) { selectedId = id;
            renderAll(); }

        // ============================================================
        // 8. 属性面板（自定义下拉）
        // ============================================================
        function updateProps() {
            const p = parts.find(x => x.id === selectedId);
            if (!p) {
                propsPanel.innerHTML = `<div style="color:#888;">请先选中一个部件</div>`;
                return;

            const hasTransform = (Math.abs(p.angle || 0) > 0.001 || Math.abs(p.skew || 0) > 0.001);

            propsPanel.innerHTML = cropBtnHtml + `
                <div style="display:flex; gap:30px; align-items:flex-start; flex-wrap:wrap;">
                    <div style="flex:0 0 auto; display:flex; flex-direction:column; gap:8px;">
                        <div style="display:flex; align-items:center; gap:4px; white-space:nowrap;">
                            <label style="width:70px; flex:0 0 auto;">文字：</label>

                        <div style="display:flex; align-items:center; gap:4px; white-space:nowrap;">
                            <label style="width:70px; flex:0 0 auto;">X (em)：</label>

                        </div>
                        <div style="display:flex; align-items:center; gap:4px; white-space:nowrap;">
                            <label style="width:70px; flex:0 0 auto;">Y (em)：</label>
                            <input type="number" step="0.01" id="prop_y_${p.id}" value="${p.y.toFixed(3)}" oninput="updateProp(${p.id}, 'y', clampY(parseFloat(this.value)||0, ${p.h}))" style="width:140px; box-sizing:border-box;">
                        </div>
                        <div style="display:flex; align-items:center; gap:4px; white-space:nowrap;">
                            <label style="width:70px; flex:0 0 auto;">宽 (em)：</label>
                            <input type="number" step="0.01" id="prop_w_${p.id}" value="${p.w.toFixed(3)}" oninput="updateProp(${p.id}, 'w', clampW(parseFloat(this.value)||0.05, ${p.x}))" style="width:140px; box-sizing:border-box;">
                        </div>
                        <div style="display:flex; align-items:center; gap:4px; white-space:nowrap;">
                            <label style="width:70px; flex:0 0 auto;">高 (em)：</label>
                            <input type="number" step="0.01" id="prop_h_${p.id}" value="${p.h.toFixed(3)}" oninput="updateProp(${p.id}, 'h', clampH(parseFloat(this.value)||0.05, ${p.y}))" style="width:140px; box-sizing:border-box;">
                        </div>
                    </div>
                    <div style="flex:0 0 auto; display:flex; flex-direction:column; gap:8px;">
                        <div style="display:flex; align-items:center; gap:4px; white-space:nowrap;">
                            <label style="width:70px; flex:0 0 auto;">粗细：</label>
                            <div class="font-custom-select weight-select" id="weightSelect_${p.id}">
                                <div class="display" id="weightDisplay_${p.id}">
                                    <span class="selected-text">${p.fontWeight}${p.fontWeight === 400 ? ' (normal)' : ''}${p.fontWeight === 700 ? ' (bold)' : ''}</span>
                                    <span class="arrow">▼</span>
                                </div>
                                <div class="dropdown" id="weightDropdown_${p.id}">
                                    <ul class="options-list" id="weightOptionsList_${p.id}">
                                        ${weightOptionsHtml}
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center; gap:4px; white-space:nowrap;">
                            <label style="width:70px; flex:0 0 auto;">旋转 (deg)：</label>
                            <input type="number" step="1" id="prop_angle_${p.id}" value="${p.angle || 0}" oninput="updateProp(${p.id}, 'angle', parseFloat(this.value)||0)" style="width:140px; box-sizing:border-box;">
                        </div>
                        <div style="display:flex; align-items:center; gap:4px; white-space:nowrap;">
                            <label style="width:70px; flex:0 0 auto;">倾斜 (deg)：</label>
                            <input type="number" step="1" id="prop_skew_${p.id}" value="${p.skew || 0}" oninput="updateProp(${p.id}, 'skew', parseFloat(this.value)||0)" style="width:140px; box-sizing:border-box;">
                        </div>
                        <div style="display:flex; align-items:center; gap:4px; white-space:nowrap;">
                            <label style="width:70px; flex:0 0 auto;">透明度：</label>
                            <input type="number" step="0.01" min="0" max="1" id="prop_opacity_${p.id}" value="${p.opacity}" oninput="updateProp(${p.id}, 'opacity', Math.min(1,Math.max(0,parseFloat(this.value)||1)))" style="width:140px; box-sizing:border-box;">
                            <span id="opacityVal_${p.id}" style="font-size:11px;color:#888;min-width:32px;">${Math.round(p.opacity*100)}%</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:4px; white-space:nowrap;">
                            <label style="width:70px; flex:0 0 auto;">颜色：</label>
                            <input type="color" id="prop_color_${p.id}" value="${p.color || '#000000'}" oninput="updateProp(${p.id}, 'color', this.value)" style="box-sizing:border-box; height:32px; padding:2px; width:50px;">
                            <button type="button" onclick="resetPartColor(${p.id})" style="font-size:12px; padding:2px 8px;">跟随父级</button>
                            <span id="colorStatus_${p.id}" style="font-size:11px;color:#888; white-space:nowrap;">${p.color ? '已自定义颜色' : '当前：跟随父级'}</span>
                        </div>
                    </div>
                </div>
                <div style="margin-top:8px; display:flex; align-items:center; gap:4px; white-space:nowrap;">
                    <label style="width:70px; flex:0 0 auto;">层级 z：</label>
                    <input type="number" step="1" id="prop_z_${p.id}" value="${p.z}" oninput="updateProp(${p.id}, 'z', parseInt(this.value)||1)" style="width:140px; box-sizing:border-box;">
                </div>
                <div style="margin-top:8px;"><button onclick="deletePart(${p.id})" style="color:red;">删除此部件</button></div>

            // 绑定自定义下拉事件
            const display = document.getElementById('fontDisplay_' + p.id);
            const dropdown = document.getElementById('fontDropdown_' + p.id);
            const searchInput = document.getElementById('fontSearch_' + p.id);
            const optionsList = document.getElementById('fontOptionsList_' + p.id);
            const selectedText = display ? display.querySelector('.selected-text') : null;

            if (display && dropdown && selectedText) {
                display.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const isOpen = dropdown.style.display === 'block';
                    document.querySelectorAll('.font-custom-select .dropdown').forEach(el => el.style.display = 'none');
                    dropdown.style.display = isOpen ? 'none' : 'block';
                    if (!isOpen) {
                        searchInput.value = '';
                        const items = optionsList.querySelectorAll('li');
                        items.forEach(li => li.style.display = '');
                        searchInput.focus();
                    }
                });

                searchInput.addEventListener('input', function() {
                    const kw = this.value.trim().toLowerCase();
                    const items = optionsList.querySelectorAll('li');
                    items.forEach(li => {
                        const text = li.textContent.toLowerCase();
                        li.style.display = text.includes(kw) ? '' : 'none';
                    });
                });

                optionsList.addEventListener('click', function(e) {
                    const li = e.target.closest('li');
                    if (!li) return;
                    const value = li.dataset.value;
                    if (value) {
                        selectedText.textContent = value;
                        dropdown.style.display = 'none';
                        updateProp(p.id, 'fontFamily', value);
                    }
                });

                // 粗细自定义下拉事件
                const wDisplay = document.getElementById('weightDisplay_' + p.id);
                const wDropdown = document.getElementById('weightDropdown_' + p.id);
                const wList = document.getElementById('weightOptionsList_' + p.id);
                if (wDisplay && wDropdown) {
                    wDisplay.addEventListener('click', function(e) {
                        e.stopPropagation();
                        document.querySelectorAll('.font-custom-select .dropdown').forEach(el => el.style.display = 'none');
                        wDropdown.style.display = wDropdown.style.display === 'block' ? 'none' : 'block';
                    });
                    wList.addEventListener('click', function(e) {
                        const li = e.target.closest('li');
                        if (!li) return;
                        const val = parseInt(li.dataset.value);
                        if (!isNaN(val)) {
                            wDisplay.querySelector('.selected-text').textContent = li.textContent;
                            wDropdown.style.display = 'none';
                            updateProp(p.id, 'fontWeight', val);
                        }
                    });
                }

                document.addEventListener('click', function(e) {
                    if (!e.target.closest('.font-custom-select')) {
                        document.querySelectorAll('.font-custom-select .dropdown').forEach(el => el.style.display = 'none');
                    }
                });
            }

            const btnCrop = document.getElementById('cropBtn');
            if (btnCrop) {
                if (hasTransform) {
                    btnCrop.disabled = true;
                    btnCrop.style.opacity = '0.5';
                    btnCrop.style.cursor = 'not-allowed';
                } else {
                    btnCrop.disabled = false;
                    btnCrop.style.opacity = '';
                    btnCrop.style.cursor = '';
                }
                btnCrop.classList.toggle('active', isCropping);
            }
            syncCropButton();
        }

        function resetPartColor(id) {
            updateProp(id, 'color', '');
            updateProp(id, 'opacity', 1);
        }

        // ============================================================
        // 9. updateProp（支持撤销）
        // ============================================================
        function updateProp(id, key, value) {
            const p = parts.find(x => x.id === id);
            if (!p) return;

            if ((key === 'angle' || key === 'skew') && isCropping) {
                exitCropMode();
            }

            let oldValue = p[key];

            if (key === 'x') value = clampX(value, p.w);
            else if (key === 'y') value = clampY(value, p.h);
            else if (key === 'w') value = clampW(value, p.x);
            else if (key === 'h') value = clampH(value, p.y);
            else if (key === 'z') value = Math.max(1, parseInt(value) || 1);
            else if (key === 'fontWeight') value = parseInt(value) || 400;
            else if (key === 'angle') value = parseFloat(value) || 0;
            else if (key === 'skew') value = parseFloat(value) || 0;
            else if (key === 'color') {
                p[key] = value;
                updatePartElement(p);
                updatePreview();
                const colorInput = document.getElementById('prop_color_' + id);
                if (colorInput) colorInput.value = p.color || '#000000';
                const statusEl = document.getElementById('colorStatus_' + id);
                if (statusEl) statusEl.textContent = p.color ? '已自定义颜色' : '当前：跟随父级';
                if (!isUndoing) {
                    const cmd = new UpdatePropCommand(id, key, oldValue, value);
                    executeCommand(cmd);
                }
                return;
            }

            if (oldValue === value || (typeof oldValue === 'number' && typeof value === 'number' && Math.abs(oldValue -
                    value) < EPS)) {
                // 更新UI
                if (key === 'x' || key === 'y' || key === 'w' || key === 'h') {
                    p[key] = value;
                    updatePartElement(p);
                    updatePreview();
                    const inputEl = document.getElementById('prop_' + key + '_' + id);
                    if (inputEl) inputEl.value = value.toFixed(3);
                } else if (key === 'z') {
                    p[key] = value;
                    parts.sort((a, b) => a.z - b.z);
                    renderAll();
                    updatePreview();
                } else if (key === 'fontFamily') {
                    p[key] = value;
                    updatePartElement(p);
                    updatePreview();
                    const display = document.querySelector(`#fontSelect_${id} .selected-text`);
                    if (display) display.textContent = value;
                } else if (key === 'angle' || key === 'skew') {
                    p[key] = value;
                    updatePartElement(p);
                    updatePreview();
                    const inputEl = document.getElementById('prop_' + key + '_' + id);
                    if (inputEl) inputEl.value = value;
                } else if (key === 'text' || key === 'fontWeight') {
                    p[key] = value;
                    updatePartElement(p);
                    updatePreview();
                    const inputEl = document.getElementById('prop_' + key + '_' + id);
                    if (inputEl) inputEl.value = value;
                }
                return;
            }

            p[key] = value;

            if (key === 'x' || key === 'y' || key === 'w' || key === 'h') {
                updatePartElement(p);
                updatePreview();
                const inputEl = document.getElementById('prop_' + key + '_' + id);
                if (inputEl) inputEl.value = value.toFixed(3);
            } else if (key === 'z') {
                parts.sort((a, b) => a.z - b.z);
                renderAll();
                updatePreview();
                const inputEl = document.getElementById('prop_z_' + id);
                if (inputEl) inputEl.value = value;
            } else if (key === 'fontFamily') {
                updatePartElement(p);
                updatePreview();
                const display = document.querySelector(`#fontSelect_${id} .selected-text`);
                if (display) display.textContent = value;
            } else if (key === 'angle' || key === 'skew') {
                updatePartElement(p);
                updatePreview();
                const inputEl = document.getElementById('prop_' + key + '_' + id);
                if (inputEl) inputEl.value = value;
                const hasTransform = (Math.abs(p.angle || 0) > 0.001 || Math.abs(p.skew || 0) > 0.001);
                const btnCrop = document.getElementById('cropBtn');
                if (btnCrop) {
                    if (hasTransform) {
                        btnCrop.disabled = true;
                        btnCrop.style.opacity = '0.5';
                        btnCrop.style.cursor = 'not-allowed';
                    } else {
                        btnCrop.disabled = false;
                        btnCrop.style.opacity = '';
                        btnCrop.style.cursor = '';
                    }
                }
            } else if (key === 'text' || key === 'fontWeight') {
                updatePartElement(p);
                updatePreview();
                const inputEl = document.getElementById('prop_' + key + '_' + id);
                if (inputEl) inputEl.value = value;
            } else if (key === 'color') {
                updatePartElement(p);
                updatePreview();
                const colorInput = document.getElementById('prop_color_' + id);
                if (colorInput) colorInput.value = p.color || '#000000';
                const statusEl = document.getElementById('colorStatus_' + id);
                if (statusEl) statusEl.textContent = p.color ? '已自定义颜色' : '当前：跟随父级';
            } else if (key === 'opacity') {
                updatePartElement(p);
                updatePreview();
                const opInput = document.getElementById('prop_opacity_' + id);
                if (opInput) opInput.value = p.opacity;
                const opacityVal = document.getElementById('opacityVal_' + id);
                if (opacityVal) opacityVal.textContent = Math.round(p.opacity * 100) + '%';
            }

            if (key !== 'color' && !isUndoing) {
                const cmd = new UpdatePropCommand(id, key, oldValue, value);
                executeCommand(cmd);
            }
        }

        // ============================================================
        // 10. 字体管理（仅保留加载系统字体，移除网络导入）
        // ============================================================
        async function loadSystemFonts() {
            if (!window.queryLocalFonts) {
                alert('您的浏览器不支持 queryLocalFonts API，请手动添加字体名称。');
                return;
            }
            try {
                const fonts = await window.queryLocalFonts();
                const names = new Set();
                fonts.forEach(f => {
                    if (f.family) names.add(f.family);
                    if (f.fullName) names.add(f.fullName);
                });
                let added = 0;
                for (const n of names) {
                    if (!customFontMap[n] && !DEFAULT_FONT_STACKS[n]) {
                        customFontMap[n] = `'${n}',sans-serif`;
                        fontNames.push(n);
                        added++;
                    }
                }
                if (added > 0) {
                    alert(`成功添加 ${added} 个系统字体`);
                    updateProps();
                } else {
                    alert('没有新的字体可添加');
                }
            } catch (e) {
                alert('获取系统字体失败：' + e.message);
            }
        }

        /** 加载 ZSFT 字体（通过 CSS URL） */
        async function loadZsftFont() {
            const url = document.getElementById('zsftUrl').value.trim();
            const statusEl = document.getElementById('zsftStatus');
            if (!url) { statusEl.textContent = '请输入字体URL'; return; }

            statusEl.textContent = '加载中...';
            statusEl.style.color = '#888';

            try {
                // 1. fetch 获取 CSS 文本（用于解析字体名）
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const cssText = await resp.text();

                // 2. 提取所有 font-family 名称
                const names = new Set();
                const regex = /font-family:\s*['"]?([^;'"}]+)['"]?\s*;/gi;
                let match;
                while ((match = regex.exec(cssText)) !== null) {
                    const raw = match[1].replace(/['"]/g, '').trim();
                    if (raw && raw !== 'inherit' && raw !== 'initial') names.add(raw);
                }

                if (names.size === 0) {
                    statusEl.textContent = '未找到字体定义，请检查URL';
                    statusEl.style.color = '#c00';
                    return;
                }

                // 3. 用 <link> 加载 CSS（相对路径才能正确解析）
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = url;
                document.head.appendChild(link);

                // 4. 等待字体加载
                await document.fonts.ready;

                // 5. 逐个确认字体可用
                let added = 0;
                const fontList = [...names];
                for (const name of fontList) {
                    // 尝试用 load 确认字体是否真正可用
                    try {
                        await document.fonts.load('1em "' + name + '"');
                    } catch (_) { /* 忽略 */ }

                    if (!customFontMap[name] && !DEFAULT_FONT_STACKS[name]) {
                        customFontMap[name] = "'" + name + "',sans-serif";
                        fontNames.push(name);
                        added++;
                    }
                }

                if (added > 0) {
                    statusEl.textContent = '成功加载 ' + added + ' 个字体';
                    statusEl.style.color = '#080';
                    updateProps();
                } else {
                    statusEl.textContent = '字体已存在，无需重复添加';
                    statusEl.style.color = '#888';
                }
            } catch (e) {
                statusEl.textContent = '加载失败：' + e.message;
                statusEl.style.color = '#c00';
            }
        }

        // ============================================================
        // 11. 预览 & 代码生成（裁剪直接应用在带有 scale 的内层，确保跟随缩放）
        // ============================================================
        function updatePreview() {
            previewChar.innerHTML = generatePreviewHTML();
            const selectedPart = parts.find(x => x.id === selectedId);
            preview.style.fontFamily = selectedPart ? getFontStack(selectedPart.fontFamily) : 'sans-serif';
        }

        function generatePreviewHTML() {
            if (parts.length === 0) return '';
            const baseline = parseFloat(document.getElementById('baselineInput').value) || -0.14;
            const sorted = [...parts].sort((a, b) => a.z - b.z);

            let clipDefs = [];
            let html = '';

            sorted.forEach(p => {
                const ff = getFontStack(p.fontFamily);
                const colorStyle = p.color ? `color:${p.color};` : '';

                let outerStyle =
                    `display:inline-block;position:absolute;left:${fmt(p.x)}em;top:${fmt(p.y)}em;width:1em;height:1em;z-index:${p.z};transform-origin:50% 50%;transform:rotate(${fmt(p.angle||0)}deg) skewX(${fmt(p.skew||0)}deg);`;

                let innerStyle =
                    `display:inline-block;transform:scale(${fmt(p.w)},${fmt(p.h)});transform-origin:0 0;width:1em;height:1em;line-height:1;font-family:${ff};font-weight:${p.fontWeight};${colorStyle}opacity:${p.opacity};`;

                let clipStyle = '';
                if (p.crops && p.crops.length > 0) {
                    const rects = p.crops.filter(r => r.w > CLIP_EPS && r.h > CLIP_EPS);
                    if (rects.length > 0) {
                        const clipId = 'preview-clip-' + p.id;
                        const outerPath = 'M0,0 L1,0 L1,1 L0,1 Z';
                        const holePaths = rects.map(r => {
                            const x1 = clamp01(r.x),
                                y1 = clamp01(r.y),
                                x2 = clamp01(r.x + r.w),
                                y2 = clamp01(r.y + r.h);
                            return `M${fmt(x1)},${fmt(y1)} L${fmt(x2)},${fmt(y1)} L${fmt(x2)},${fmt(y2)} L${fmt(x1)},${fmt(y2)} Z`;
                        }).filter(Boolean);
                        if (holePaths.length > 0) {
                            const d = outerPath + ' ' + holePaths.join(' ');
                            clipDefs.push(
                                `<clipPath id="${clipId}" clipPathUnits="objectBoundingBox"><path clip-rule="evenodd" d="${d}"/></clipPath>`
                                );
                            clipStyle = `clip-path:url(#${clipId});-webkit-clip-path:url(#${clipId});`;
                        }
                    }
                }

                innerStyle += clipStyle;

                html += `<span style="${outerStyle}"><span style="${innerStyle}">${escapeHtml(p.text)}</span></span>`;
            });

            const svgDefs = clipDefs.length > 0 ?
                `<svg style="position:absolute;width:0;height:0;overflow:hidden;pointer-events:none;" aria-hidden="true"><defs>${clipDefs.join('')}</defs></svg>` :
                '';

            return svgDefs +
                '<span style="display:inline-block;position:relative;width:1em;height:1em;line-height:1;vertical-align:' +
                fmt(baseline) + 'em;">' + html + '</span>';
        }

        function generateCodeHTML() {
            if (parts.length === 0) return '';
            const baseline = parseFloat(document.getElementById('baselineInput').value) || -0.14;
            const includeFont = document.getElementById('includeFont').checked;
            const formatCode = document.getElementById('formatCode').checked;
            const nl = formatCode ? '\n' : '';
            const randSuffix = Math.random().toString(36).slice(2, 8);

            const sorted = [...parts].sort((a, b) => a.z - b.z);
            // 缩进辅助：level 0 不缩进，level 1=2空格，level 2=4空格，level 3=6空格
            const I = (level) => formatCode ? '  '.repeat(level) : '';

            const outerOpen = '<span style="display:inline-block;position:relative;width:1em;height:1em;line-height:1;vertical-align:' +
                fmt(baseline) + 'em;">';

            if (document.getElementById('useSvgPaths').checked) {
                let inner = '';
                sorted.forEach(p => {
                    const colorStyle = p.color ? `fill:${p.color};opacity:${p.opacity};` : `fill:#000;opacity:${p.opacity};`;
                    const outerStyle =
                        `display:inline-block;position:absolute;left:${fmt(p.x)}em;top:${fmt(p.y)}em;width:1em;height:1em;z-index:${p.z};transform-origin:50% 50%;transform:rotate(${fmt(p.angle||0)}deg) skewX(${fmt(p.skew||0)}deg);`;
                    const pathData = generatePartSvgPaths(p);
                    if (pathData.length === 0) {
                        inner += I(1) + `<span style="${outerStyle}"></span>` + nl;
                        return;
                    }
                    const fullD = escapeHtml(pathData.join(' '));
                    inner += I(1) + `<span style="${outerStyle}">` + nl +
                        I(2) + `<svg style="display:block;overflow:visible;width:${fmt(p.w)}em;height:${fmt(p.h)}em;" viewBox="0 0 ${fmt(p.w)} ${fmt(p.h)}" preserveAspectRatio="none">` + nl +
                        I(3) + `<path d="${fullD}" fill-rule="evenodd" style="${colorStyle}"/>` + nl +
                        I(2) + `</svg>` + nl +
                        I(1) + `</span>` + nl;
                });
                return outerOpen + nl + inner + I(0) + '</span>';
            }

            let clipDefs = [];
            let inner = '';

            sorted.forEach(p => {
                const colorStyle = p.color ? `color:${p.color};` : '';
                const ff = includeFont ? getFontStack(p.fontFamily) : '';

                const outerStyle =
                    `display:inline-block;position:absolute;left:${fmt(p.x)}em;top:${fmt(p.y)}em;width:1em;height:1em;z-index:${p.z};transform-origin:50% 50%;transform:rotate(${fmt(p.angle||0)}deg) skewX(${fmt(p.skew||0)}deg);`;

                let innerStyle =
                    `display:inline-block;transform:scale(${fmt(p.w)},${fmt(p.h)});transform-origin:0 0;width:1em;height:1em;line-height:1;font-weight:${p.fontWeight};${colorStyle}opacity:${p.opacity};`;
                if (includeFont) innerStyle += `font-family:${ff};`;

                let clipStyle = '';
                if (p.crops && p.crops.length > 0) {
                    const rects = p.crops.filter(r => r.w > CLIP_EPS && r.h > CLIP_EPS);
                    if (rects.length > 0) {
                        const clipId = 'clip-' + p.id + '-' + randSuffix;
                        const outerPath = 'M0,0 L1,0 L1,1 L0,1 Z';
                        const holePaths = rects.map(r => {
                            const x1 = clamp01(r.x),
                                y1 = clamp01(r.y),
                                x2 = clamp01(r.x + r.w),
                                y2 = clamp01(r.y + r.h);
                            return `M${fmt(x1)},${fmt(y1)} L${fmt(x2)},${fmt(y1)} L${fmt(x2)},${fmt(y2)} L${fmt(x1)},${fmt(y2)} Z`;
                        }).filter(Boolean);
                        if (holePaths.length > 0) {
                            const d = outerPath + ' ' + holePaths.join(' ');
                            clipDefs.push({ clipId, d });
                            clipStyle = `clip-path:url(#${clipId});-webkit-clip-path:url(#${clipId});`;
                        }
                    }
                }

                innerStyle += clipStyle;

                inner += I(1) + `<span style="${outerStyle}">` + nl +
                    I(2) + `<span style="${innerStyle}">${escapeHtml(p.text)}</span>` + nl +
                    I(1) + `</span>` + nl;
            });

            // 构建 clipPath 定义
            let defsStr = '';
            if (clipDefs.length > 0) {
                defsStr = I(0) + `<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">` + nl +
                    I(1) + `<defs>` + nl;
                clipDefs.forEach(cd => {
                    defsStr += I(2) + `<clipPath id="${cd.clipId}" clipPathUnits="objectBoundingBox">` + nl +
                        I(3) + `<path clip-rule="evenodd" d="${cd.d}"/>` + nl +
                        I(2) + `</clipPath>` + nl;
                });
                defsStr += I(1) + `</defs>` + nl +
                    I(0) + `</svg>` + nl;
            }

            return defsStr + outerOpen + nl + inner + I(0) + '</span>';
        }
