<script>
(function() {
  // 简体中文名称
  var chineseSC = ['','氢','氦','锂','铍','硼','碳','氮','氧','氟','氖',
   '钠','镁','铝','硅','磷','硫','氯','氩','钾','钙','钪','钛','钒','铬','锰','铁','钴','镍','铜','锌',
   '镓','锗','砷','硒','溴','氪','铷','锶','钇','锆','铌','钼','锝','钌','铑','钯','银','镉',
   '铟','锡','锑','碲','碘','氙','铯','钡','镧','铈','镨','钕','钷','钐','铕','钆','铽','镝','钬','铒','铥','镱','镥',
   '铪','钽','钨','铼','锇','铱','铂','金','汞','铊','铅','铋','钋','砹','氡',
   '钫','镭','锕','钍','镤','铀','镎','钚','镅','锔','锫','锎','锿','镄','钔','锘','铹',
   '𬬻','𬭊','𬭳','𬭛','𬭶','鿏','𫟼','𬬭','鿔','鿭','𫓧','镆','𫟷','鿬','鿫'];

  // 繁体中文名称
  var chineseTC = ['','氫','氦','鋰','鈹','硼','碳','氮','氧','氟','氖',
   '鈉','鎂','鋁','矽','磷','硫','氯','氬','鉀','鈣','鈧','鈦','釩','鉻','錳','鐵','鈷','鎳','銅','鋅',
   '鎵','鍺','砷','硒','溴','氪','銣','鍶','釔','鋯','鈮','鉬','鍀','釕','銠','鈀','銀','鎘',
   '銦','錫','銻','碲','碘','氙','銫','鋇','鑭','鈰','鐠','釹','鉕','釤','銪','釓','鋱','鏑','鈥','鉺','銩','鐿','鑥',
   '鉿','鉭','鎢','錸','鋨','銥','鉑','金','汞','鉈','鉛','鉍','釙','砹','氡',
   '鍅','鐳','錒','釷','鏷','鈾','錼','鈈','鎇','鋦','鉳','鉲','鑀','鐨','鍆','鍩','鐒',
   '鑪','𨧀','𨭎','𨨏','𨭆','䥑','鐽','錀','鎶','鉨','鈇','鏌','鉝','鿬','鿫'];

  // 法汉合璧 设置隐藏
  var chineseFFHB = chineseTC.slice(); // 复制数组
  var hideIndices = [2, 10, 18, 21, 23, 31, 32, 36, 43, 54, 72, 75, 91, 118]; // 所有要隐藏的索引
   hideIndices.forEach(function(i) {
    chineseFFHB[i] = '';
  });
  chineseFFHB[14] = '砂'; 
  chineseFFHB[68] = '鎄'; 
  chineseFFHB.fill('', 59, 68);
  chineseFFHB.fill('', 69, 72);
  chineseFFHB.fill('', 84, 90);
  chineseFFHB.fill('', 93, 119); 

  // 镧系/锕系标签
  var labels = {
    sc: { lan: '镧系', ac: '锕系' },
    tc: { lan: '鑭系', ac: '錒系' },
    ffhb: { lan: '', ac: '' }
  };

  // 根据原子序数获取区块（函数保持不变）
  function getBlock(num) {
    if ((num>=1 && num<=2) || (num>=3 && num<=4) || (num>=11 && num<=12) || (num>=19 && num<=20) || (num>=37 && num<=38) || (num>=55 && num<=56) || (num>=87 && num<=88)) return 's';
    if ((num>=5 && num<=10) || (num>=13 && num<=18) || (num>=31 && num<=36) || (num>=49 && num<=54) || (num>=81 && num<=86) || (num>=113 && num<=118)) return 'p';
    if ((num>=21 && num<=30) || (num>=39 && num<=48) || (num>=72 && num<=80) || (num>=104 && num<=112)) return 'd';
    if ((num>=58 && num<=71) || (num>=90 && num<=103)) return 'f';
    return 's';
  }

  // 生成表格HTML的函数（接受名称数组和标签对象）
  function generateTableHTML(nameArray, label) {
    // 构建表格行数据（二维数组）
    var rows = [];
    // 周期1-7行，每行19列（索引0为周期号，1-18为元素或空）
    for (var r = 1; r <= 7; r++) {
      var row = [r];
      for (var c = 1; c <= 18; c++) row.push(null);
      rows.push(row);
    }
    // 镧系行（第8行）和锕系行（第9行），第一列用标签
    rows.push([label.lan, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null]);
    rows.push([label.ac, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null]);

    // 填充主体元素（包括57和89，但不显示原子序数）
    for (var n = 1; n <= 118; n++) {
      if ((n>=58 && n<=71) || (n>=90 && n<=103)) continue;

      var r, c;
      if (n <= 2) r = 1;
      else if (n <= 10) r = 2;
      else if (n <= 18) r = 3;
      else if (n <= 36) r = 4;
      else if (n <= 54) r = 5;
      else if (n <= 86) r = 6;
      else r = 7;

      if (r === 1) c = (n === 1) ? 1 : 18;
      else if (r === 2) { var map2={3:1,4:2,5:13,6:14,7:15,8:16,9:17,10:18}; c = map2[n]; }
      else if (r === 3) { var map3={11:1,12:2,13:13,14:14,15:15,16:16,17:17,18:18}; c = map3[n]; }
      else if (r === 4) c = n - 18;
      else if (r === 5) c = n - 36;
      else if (r === 6) {
        if (n >= 55 && n <= 56) c = n - 54;
        else if (n === 57) c = 3;
        else if (n >= 72 && n <= 86) c = n - 68;
      } else if (r === 7) {
        if (n >= 87 && n <= 88) c = n - 86;
        else if (n === 89) c = 3;
        else if (n >= 104 && n <= 118) c = n - 100;
      }

      if (r && c) {
        var block = getBlock(n);
        var showAtomic = !(n === 57 || n === 89);
        rows[r-1][c] = { num: n, name: nameArray[n], block: block, showAtomic: showAtomic };
      }
    }

    // 填充镧系 (57-71) 到第8行
    for (n = 57; n <= 71; n++) {
      var col = 3 + (n - 57);
      rows[7][col] = { num: n, name: nameArray[n], block: 'f', showAtomic: true };
    }
    // 填充锕系 (89-103) 到第9行
    for (n = 89; n <= 103; n++) {
      var col = 3 + (n - 89);
      rows[8][col] = { num: n, name: nameArray[n], block: 'f', showAtomic: true };
    }

    // 生成HTML字符串
    var html = '';
    for (var i = 0; i < rows.length; i++) {
      var row = rows[i];
      html += '<tr>';
      for (var j = 0; j < row.length; j++) {
        var cell = row[j];
        // 处理镧系行第一列合并两列
        if (i === 7 && j === 0) {
          html += '<td class="series-label" style="background: #d0dbe8; text-align: center; padding: 4px; border: 1px solid #333;" colspan="2">' + label.lan + '</td>';
          j++; continue;
        }
        if (i === 8 && j === 0) {
          html += '<td class="series-label" style="background: #d0dbe8; text-align: center; padding: 4px; border: 1px solid #333;" colspan="2">' + label.ac + '</td>';
          j++; continue;
        }
        if (typeof cell === 'object' && cell !== null) {
        // 特殊处理主体行中的57和89位置
          if (i+1 === 6 && j === 3) {
            // 第6行第3列显示 "57-71"
            html += '<td class="element" style="text-align:center; padding:4px 1px; border:1px solid #333; background:#f3e9fa; font-size:10px;"><strong>57-71</strong></td>';
          } else if (i+1 === 7 && j === 3) {
            // 第7行第3列显示 "89-103"
            html += '<td class="element" style="text-align:center; padding:4px 1px; border:1px solid #333; background:#f3e9fa; font-size:10px;"><strong>89-103</strong></td>';
          } else {
            var atomicHtml = cell.showAtomic ? '<span class="atomic-number">' + cell.num + '</span>' : '';
            var bgColor = cell.block === 's' ? '#f0f5ff' : cell.block === 'd' ? '#ecf7f0' : cell.block === 'p' ? '#fff2e6' : '#f3e9fa';
            html += '<td class="element ' + cell.block + '" style="text-align:center; padding:4px 1px; border:1px solid #333; background:' + bgColor + ';">' +
              '<strong>' + cell.name + '</strong><br>' + atomicHtml + '</td>';
          }
        } else if (cell === null) {
          html += '<td style="border:1px solid #333; background:#f0f0f0;"></td>';
        } else {
          // 周期号单元格（数字）
          html += '<td style="background:#d0dbe8; font-weight:bold; text-align:center; padding:4px; border:1px solid #333;">' + cell + '</td>';
        }
      }
      html += '</tr>';
    }
    return html;
  }

  // 获取容器
  var tbody = document.getElementById('table-body');
  var container = document.getElementById('periodic-table');
  var fontSelect = document.getElementById('fontSelect');
  var sizeSlider = document.getElementById('sizeSlider');
  var sizeValue = document.getElementById('sizeValue');
  var boldCheckbox = document.getElementById('boldCheckbox');

  if (!tbody || !container || !fontSelect || !sizeSlider || !sizeValue || !boldCheckbox) return;

  // 初始渲染：默认 '2019-2026'，使用繁体
  tbody.innerHTML = generateTableHTML(chineseTC, labels.tc);

  // 字体切换
  fontSelect.addEventListener('change', function(e) {
    var selectedValue = e.target.value;
    if (selectedValue === 'SIMPLIFIED') {
      // 简体选项：使用简体数据
      tbody.innerHTML = generateTableHTML(chineseSC, labels.sc);
      container.style.fontFamily = "'2019-2026', '宋体', serif";
    } else if (selectedValue === "'elements-fhhb', '宋体', serif") {
      // ffhb 字体：使用定制繁体数组和空标签
      tbody.innerHTML = generateTableHTML(chineseFFHB, labels.ffhb);
      container.style.fontFamily = selectedValue;
    } else {
      // 其他字体：完整繁体
      tbody.innerHTML = generateTableHTML(chineseTC, labels.tc);
      container.style.fontFamily = selectedValue;
    }
  });

  // 大小缩放控制（基准1.5倍）
  var baseScale = 1.5;
  function updateScale(relScale) {
    var actualScale = relScale * baseScale;
    container.style.transform = 'scale(' + actualScale + ')';
    sizeValue.textContent = Math.round(relScale * 100) + '%';
  }
  sizeSlider.addEventListener('input', function(e) {
    updateScale(parseFloat(e.target.value));
  });
  updateScale(1.0);

  // 加粗控制
  boldCheckbox.addEventListener('change', function(e) {
    if (e.target.checked) {
      container.classList.remove('normal-names');
      container.classList.add('bold-names');
    } else {
      container.classList.remove('bold-names');
      container.classList.add('normal-names');
    }
  });
})();
</script></div>
